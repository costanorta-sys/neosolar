<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>⚡ NeoSolar · Catálogo Futurista</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== RESET & GLOBAL ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: #0b0e1a;
            color: #e0f0ff;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 30%, #112244 0%, #05070e 90%);
            background-attachment: fixed;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0e1a; }
        ::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; box-shadow: 0 0 12px #00d4ff88; }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            margin-bottom: 30px;
            background: rgba(10, 14, 30, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(0, 212, 255, 0.25);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #a855f7, #00d4ff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 4s linear infinite;
            letter-spacing: 2px;
        }
        @keyframes shineText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header .logo-icon { font-size: 2rem; margin-right: 10px; color: #00d4ff; filter: drop-shadow(0 0 8px #00d4ff); }
        .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-neon {
            background: transparent;
            border: 1.5px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 24px;
            border-radius: 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-neon:hover { background: #00d4ff; color: #0b0e1a; box-shadow: 0 0 30px #00d4ffaa; transform: scale(1.04); }
        .btn-neon.success { border-color: #39ff14; color: #39ff14; }
        .btn-neon.success:hover { background: #39ff14; color: #0b0e1a; box-shadow: 0 0 30px #39ff14aa; }
        .btn-neon.danger { border-color: #ff3b5c; color: #ff3b5c; }
        .btn-neon.danger:hover { background: #ff3b5c; color: #0b0e1a; box-shadow: 0 0 30px #ff3b5caa; }
        .btn-neon.admin { border-color: #a855f7; color: #a855f7; }
        .btn-neon.admin:hover { background: #a855f7; color: #0b0e1a; box-shadow: 0 0 30px #a855f7aa; }

        /* ===== VISTAS ===== */
        .view { display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== CATÁLOGO ===== */
        .catalog-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
        }
        .catalog-header .filter { display: flex; align-items: center; gap: 12px; }
        .catalog-header .filter label { font-size: 0.8rem; color: #88aacc; letter-spacing: 1px; }
        .catalog-header .filter select {
            background: #0b0e1a;
            border: 1px solid #2a3a5a;
            border-radius: 40px;
            padding: 10px 20px;
            color: #e0f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .catalog-header .filter select:focus { border-color: #00d4ff; box-shadow: 0 0 20px #00d4ff44; }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 35px;
            padding: 10px 0;
            min-height: 300px;
        }

        /* ===== TARJETAS ===== */
        .card {
            background: rgba(12, 18, 38, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px 18px 22px;
            transition: all 0.35s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 212, 255, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 30px;
            background: linear-gradient(135deg, #00d4ff33, #a855f733, #00d4ff33);
            background-size: 300% 300%;
            z-index: -1;
            animation: borderGlow 6s ease-in-out infinite;
            opacity: 0.6;
        }
        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 50px rgba(0, 212, 255, 0.25), 0 0 40px rgba(0, 212, 255, 0.1);
            border-color: #00d4ff88;
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: #0a0d1a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .card-img-wrapper:hover { filter: brightness(1.05); border-color: #00d4ff66; }
        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0d1a;
            transition: 0.3s;
        }
        .card-img-wrapper .img-placeholder { font-size: 4rem; color: #2a3a5a; opacity: 0.5; }
        .card-img-wrapper::after {
            content: '🔍';
            position: absolute;
            bottom: 16px;
            right: 18px;
            font-size: 1.6rem;
            opacity: 0;
            transition: 0.3s;
            text-shadow: 0 0 20px #000;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            padding: 6px 10px;
            line-height: 1;
        }
        .card-img-wrapper:hover::after { opacity: 0.9; }

        .card-category { font-size: 0.65rem; color: #a855f7; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; margin-bottom: 2px; }
        .card-title { font-size: 1.15rem; font-weight: 700; margin: 4px 0 6px; color: #f0f8ff; letter-spacing: 0.5px; }
        .card-desc { font-size: 0.85rem; font-weight: 400; color: #b0c8e0; line-height: 1.5; flex-grow: 1; margin-bottom: 12px; font-family: 'Segoe UI', sans-serif; letter-spacing: 0.2px; }
        .card-price { font-size: 1.5rem; font-weight: 700; color: #39ff14; text-shadow: 0 0 20px #39ff1466; margin: 6px 0 4px; }
        .card-price span { font-size: 0.9rem; color: #88aacc; }
        .card-stock { font-size: 0.75rem; color: #88aacc; margin-bottom: 14px; letter-spacing: 0.5px; }
        .card-stock .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            background: #00d4ff22;
            border: 1px solid #00d4ff44;
            color: #00d4ff;
            font-weight: 600;
        }
        .card-stock .badge.agotado { background: #ff3b5c22; border-color: #ff3b5c66; color: #ff3b5c; }
        .card-actions { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
        .card-actions .btn-neon { flex: 1; justify-content: center; padding: 12px 10px; font-size: 0.75rem; }
        .card-actions .btn-neon:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.4s ease;
            padding: 30px;
            cursor: zoom-out;
        }
        .lightbox.open { visibility: visible; opacity: 1; }
        .lightbox img {
            max-width: 92%;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 0 80px rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
            transition: transform 0.4s ease;
            background: #0a0d1a;
        }
        .lightbox.open img { transform: scale(1); }
        .lightbox .close-lightbox {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 3rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
            background: none;
            border: none;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px #000;
        }
        .lightbox .close-lightbox:hover { opacity: 1; transform: rotate(90deg); }
        .lightbox .lb-caption {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: #b0c8e0;
            font-size: 1.1rem;
            font-family: 'Segoe UI', sans-serif;
            padding: 0 20px;
            text-shadow: 0 0 20px #000;
            letter-spacing: 0.5px;
        }

        /* ===== TOAST ===== */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 2000;
            animation: fadeOut 3s forwards;
            text-align: center;
            font-size: 0.9rem;
            max-width: 90%;
            font-family: 'Segoe UI', sans-serif;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .toast-msg i { margin-right: 10px; }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; transform: translateX(-50%) translateY(20px); }
        }

        /* ===== ADMIN ===== */
        .admin-panel {
            background: rgba(10, 14, 30, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px;
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.08);
            margin-top: 20px;
        }
        .admin-panel h2 { font-size: 1.6rem; color: #a855f7; text-shadow: 0 0 30px #a855f766; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(168, 85, 247, 0.15);
            margin-bottom: 40px;
        }
        .admin-form .field { display: flex; flex-direction: column; gap: 4px; }
        .admin-form label { font-size: 0.7rem; color: #a0b8d0; letter-spacing: 1px; text-transform: uppercase; }
        .admin-form input, .admin-form textarea, .admin-form select {
            background: #0b0e1a;
            border: 1px solid #2a3a5a;
            border-radius: 16px;
            padding: 12px 16px;
            color: #e0f0ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }
        .admin-form input:focus, .admin-form textarea:focus, .admin-form select:focus { border-color: #a855f7; box-shadow: 0 0 20px #a855f744; }
        .admin-form textarea { resize: vertical; min-height: 60px; }
        .admin-form .checkbox-field { flex-direction: row; align-items: center; gap: 12px; }
        .admin-form .checkbox-field input { width: 22px; height: 22px; accent-color: #a855f7; }
        .admin-form .file-field { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .admin-form .file-field input[type="file"] { background: transparent; border: none; padding: 8px 0; color: #a0b8d0; font-family: 'Segoe UI', sans-serif; flex: 1; }
        .admin-form .file-field .preview-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; background: #0f1322; border: 1px solid #2a3a5a; }
        .admin-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 8px; grid-column: 1 / -1; }

        .admin-list { margin-top: 30px; }
        .admin-list .list-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
            background: rgba(0, 0, 0, 0.25);
            padding: 14px 20px;
            border-radius: 20px;
            border-bottom: 1px solid rgba(168, 85, 247, 0.08);
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .admin-list .list-item:hover { background: rgba(168, 85, 247, 0.05); }
        .admin-list .list-item .info { flex: 1; min-width: 150px; font-size: 0.85rem; }
        .admin-list .list-item .info strong { color: #f0f8ff; }
        .admin-list .list-item .info .small { color: #88aacc; font-size: 0.7rem; margin-left: 12px; }
        .admin-list .list-item .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-list .list-item .actions .btn-neon { padding: 6px 16px; font-size: 0.65rem; }
        .admin-list .list-item .thumb { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #0f1322; border: 1px solid #2a3a5a; }

        /* ===== IMPORT / EXPORT ===== */
        .io-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            padding: 20px 25px;
            margin-top: 30px;
            border: 1px solid rgba(168, 85, 247, 0.1);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
        }
        .io-section .io-group { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; flex: 1; }
        .io-section .io-group label { font-size: 0.7rem; color: #88aacc; letter-spacing: 1px; }
        .io-section .io-group input {
            background: #0b0e1a;
            border: 1px solid #2a3a5a;
            border-radius: 40px;
            padding: 10px 18px;
            color: #e0f0ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            outline: none;
            flex: 1;
            min-width: 200px;
        }
        .io-section .io-group input:focus { border-color: #a855f7; }

        /* ===== MODAL CARRITO ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .modal-overlay.open { visibility: visible; opacity: 1; }
        .modal-box {
            background: #121a2e;
            border-radius: 40px;
            padding: 35px 40px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(0, 212, 255, 0.25);
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.15);
            transform: scale(0.95);
            transition: 0.3s ease;
        }
        .modal-overlay.open .modal-box { transform: scale(1); }
        .modal-box h3 { font-size: 1.3rem; color: #00d4ff; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .modal-box .field { margin-bottom: 18px; }
        .modal-box .field label { display: block; font-size: 0.7rem; color: #88aacc; letter-spacing: 1px; margin-bottom: 4px; }
        .modal-box .field input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 20px;
            border: 1px solid #2a3a5a;
            background: #0b0e1a;
            color: #e0f0ff;
            font-size: 1rem;
            outline: none;
        }
        .modal-box .field input:focus { border-color: #00d4ff; box-shadow: 0 0 20px #00d4ff44; }
        .modal-actions { display: flex; gap: 12px; margin-top: 25px; justify-content: flex-end; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .header { flex-direction: column; align-items: stretch; border-radius: 30px; padding: 18px; }
            .header h1 { font-size: 1.4rem; text-align: center; }
            .nav-buttons { justify-content: center; }
            .admin-form { grid-template-columns: 1fr; }
            .modal-box { padding: 25px 20px; }
            .catalog-header { flex-direction: column; align-items: stretch; }
            .io-section { flex-direction: column; align-items: stretch; }
            .catalog-grid { grid-template-columns: 1fr; gap: 25px; }
            .card-img-wrapper { height: 220px; }
            .lightbox img { max-width: 96%; max-height: 65vh; }
            .lightbox .close-lightbox { top: 15px; right: 20px; font-size: 2.4rem; }
            .card-title { font-size: 1rem; }
            .card-price { font-size: 1.3rem; }
        }

        .text-center { text-align: center; }
        .text-muted { color: #88aacc; font-size: 0.8rem; }
        .mt-20 { margin-top: 20px; }
        .loading-spinner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 0;
            gap: 15px;
            color: #00d4ff;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }
        .loading-spinner i { font-size: 2.5rem; animation: spin 1.2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #88aacc;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .sync-indicator .fa-sync-alt { font-size: 0.8rem; }
        .sync-indicator .fa-sync-alt.spinning { animation: spin 1s linear infinite; }
        .sync-indicator.success { color: #39ff14; border-color: #39ff1444; }
        .sync-indicator.error { color: #ff3b5c; border-color: #ff3b5c44; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 15px;
            color: #88aacc;
            grid-column: 1 / -1;
            text-align: center;
        }
        .empty-state i { font-size: 4rem; opacity: 0.3; }
        .empty-state h3 { font-size: 1.2rem; color: #b0c8e0; }
        .empty-state p { font-size: 0.9rem; max-width: 400px; }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div style="display:flex;align-items:center;gap:8px;">
            <span class="logo-icon"><i class="fas fa-solar-panel"></i></span>
            <h1>NEO·SOLAR</h1>
        </div>
        <div class="nav-buttons">
            <button class="btn-neon" id="btnCatalog" onclick="switchView('catalog')">
                <i class="fas fa-th"></i> Catálogo
            </button>
            <!-- Admin oculto en menú, solo por URL -->
        </div>
    </header>

    <!-- ==================== VISTA CATÁLOGO ==================== -->
    <div id="catalogView" class="view active">
        <div class="catalog-header">
            <div class="filter">
                <label><i class="fas fa-tags"></i> Categoría:</label>
                <select id="categoryFilter" onchange="applyFilter()">
                    <option value="all">Todas</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <span class="text-muted" id="productCount">0 productos</span>
                <button class="btn-neon" onclick="forceSyncNow()" style="padding:6px 14px; font-size:0.7rem;">
                    <i class="fas fa-sync-alt"></i> Actualizar ahora
                </button>
                <span id="syncIndicator" class="sync-indicator">
                    <i class="fas fa-circle"></i> Cargando...
                </span>
            </div>
        </div>
        <div id="catalogGrid" class="catalog-grid">
            <div class="loading-spinner" id="loadingSpinner">
                <i class="fas fa-sync-alt"></i>
                <span>Cargando catálogo...</span>
            </div>
        </div>
    </div>

    <!-- ==================== VISTA ADMIN (oculta, #/admin) ==================== -->
    <div id="adminView" class="view">
        <div class="admin-panel">
            <h2><i class="fas fa-cog" style="color:#a855f7;"></i> Panel de Control</h2>

            <!-- Configurar Teléfono -->
            <div style="background:rgba(0,0,0,0.2); padding:20px 25px; border-radius:30px; margin-bottom:30px; border:1px solid rgba(168,85,247,0.1);">
                <div style="display:flex; flex-wrap:wrap; align-items:center; gap:15px;">
                    <label style="font-size:0.8rem; color:#a0b8d0; letter-spacing:1px;">
                        <i class="fab fa-whatsapp" style="color:#25D366;"></i> NÚMERO WHATSAPP (código país, sin +):
                    </label>

        // ============================================================
        //  SINCRONIZACIÓN CON JSON REMOTO (igual que MODA FIT)
        // ============================================================
        async function loadProductsFromRemoteJson(showFeedback = true, updateLocalStorage = true) {
            if (syncInProgress) {
                showMessage("Ya hay una sincronización en curso...", false);
                return;
            }
            syncInProgress = true;
            setSyncIndicator('loading', 'Sincronizando...');

            // Mostrar spinner
            if (loadingSpinner) loadingSpinner.style.display = 'flex';

            let url = remoteJsonUrl;
            if (importUrl) url = importUrl.value.trim() || url;

            // Reintentos (3 intentos)
            let attempts = 0;
            const maxAttempts = 3;
            let success = false;
            let lastError = null;

            while (attempts < maxAttempts && !success) {
                try {
                    attempts++;
                    console.log(`🌐 Intento ${attempts}/${maxAttempts} - ${url}`);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => {
                        console.warn(`⏰ Timeout en intento ${attempts}`);
                        controller.abort();
                    }, 60000); // 60 segundos

                    const response = await fetch(url, {
                        signal: controller.signal,
                        cache: 'no-cache',
                        headers: {
                            'Cache-Control': 'no-cache',
                            'Pragma': 'no-cache',
                            'Accept': 'application/json'
                        }
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const remoteData = await response.json();

                    // Validar estructura
                    if (remoteData.productos && Array.isArray(remoteData.productos)) {
                        productos = remoteData.productos;
                        if (updateLocalStorage) saveProductsToLocal();

                        // Categorías
                        if (remoteData.categorias && Array.isArray(remoteData.categorias)) {
                            categorias = remoteData.categorias.filter(c => typeof c === 'string' && c.trim() !== '');
                            if (updateLocalStorage) {
                                // Guardamos categorías en el mismo storage de productos? No es necesario, se extraen de productos.
                            }
                        } else {
                            const catsUnicas = [...new Set(productos.map(p => p.categoria).filter(c => c && typeof c === 'string' && c.trim() !== ""))];
                            categorias = catsUnicas;
                        }

                        // Configuración
                        if (remoteData.config && remoteData.config.whatsappNumber) {
                            config.whatsappNumber = remoteData.config.whatsappNumber;
                            if (updateLocalStorage) saveConfigToLocal();
                            if (phoneInput) phoneInput.value = config.whatsappNumber;
                            updatePhoneStatus();
                        }

                        if (showFeedback) showMessage(`✅ Datos sincronizados: ${productos.length} productos`);
                        success = true;
                    } else {
                        throw new Error("Formato de datos inválido");
                    }
                } catch (err) {
                    lastError = err;
                    console.error(`❌ Error en intento ${attempts}:`, err);
                    if (attempts < maxAttempts) {
                        const delay = 3000 * attempts;
                        showMessage(`⏳ Reintentando (${attempts}/${maxAttempts})...`, false);
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }
            }

            if (!success) {
                if (showFeedback) showMessage(`❌ Error al sincronizar: ${lastError ? lastError.message : 'Conexión fallida'}`, true);
                setSyncIndicator('error', 'Error de sincronización');
            } else {
                setSyncIndicator('success', `${productos.length} productos`);
            }

            syncInProgress = false;
            if (loadingSpinner) loadingSpinner.style.display = 'none';

            // Renderizar
            actualizarFiltrosCategoria();
            renderProductos();
            renderAdminProductList();
            updateCartUI();
        }

                version: "1.0",
                lastExport: new Date().toISOString()
            };
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "neosolar_catalog.json";
            a.click();
            URL.revokeObjectURL(url);
            showMessage("📁 JSON exportado correctamente");

        function actualizarFiltrosCategoria() {
            if (!categoryFilter) return;
            const cats = new Set();

            let html = '<option value="all">Todas</option>';
            categorias.forEach(c => {
                html += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
            });
            categoryFilter.innerHTML = html;
            categoryFilter.value = categoriaActiva || 'all';
        }

        function applyFilter() {
            categoriaActiva = categoryFilter.value;
            renderProductos();
        }

        function renderProductos() {
            if (!catalogGrid) return;

            let filtrados = productos.filter(p => p.activo !== false);
            if (categoriaActiva !== 'all') {
                filtrados = filtrados.filter(p => p.categoria === categoriaActiva);
            }

            if (filtrados.length === 0) {
                catalogGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>No hay productos</h3>
                        <p>Presiona "Actualizar ahora" para sincronizar con GitHub.</p>
                    </div>
                `;
                productCount.textContent = '0 productos';
                return;
            }

            productCount.textContent = filtrados.length + ' productos';
            let html = '';
            filtrados.forEach(p => {
                const imgSrc = p.imagenBase64 || 'https://placehold.co/600x400?text=NEO+SOLAR';
                const stockText = (p.stock !== undefined && p.stock > 0) ?
                    `<span class="badge"><i class="fas fa-check-circle" style="color:#39ff14;"></i> ${p.stock} uds.</span>` :
                    `<span class="badge agotado"><i class="fas fa-times-circle"></i> AGOTADO</span>`;
                const disabledAttr = (p.stock !== undefined && p.stock <= 0) ? 'disabled' : '';

                html += `
                    <div class="card">
                        <div class="card-img-wrapper" data-fullimg="${imgSrc}">
                            <img class="product-img" src="${imgSrc}" alt="${escapeHtml(p.nombre)}" loading="lazy" onerror="this.src='https://placehold.co/600x400?text=error'">
                        </div>
                        <div class="card-category">${p.categoria || 'Sin categoría'}</div>
                        <div class="card-title">${escapeHtml(p.nombre)}</div>
                        <div class="card-desc">${escapeHtml((p.descripcion || '').substring(0, 100))}</div>
                        <div class="card-price">$ ${p.precio ? p.precio.toFixed(2) : '0.00'}</div>
                        <div class="card-stock">${stockText}</div>
                        <div class="card-actions">
                            <button class="btn-neon" ${disabledAttr} onclick="openCartModal('${p.id}')">
                                <i class="fas fa-cart-plus"></i> Añadir
                            </button>
                        </div>
                    </div>
                `;
            });
            catalogGrid.innerHTML = html;

            // Evento para lightbox al hacer clic en la imagen
            document.querySelectorAll('.card-img-wrapper').forEach(el => {
                el.addEventListener('click', function(e) {
                    const fullImg = this.getAttribute('data-fullimg');
                    if (fullImg) {
                        document.getElementById('lightboxImg').src = fullImg;
                        document.getElementById('lightboxCaption').textContent = '';
                        document.getElementById('lightbox').classList.add('open');
                    }
                });
            });
        }

        // ============================================================
        //  ADMIN: LISTA Y CRUD
        // ============================================================
        function renderAdminProductList() {
            if (!adminProductList) return;
            if (!productos || productos.length === 0) {
                adminProductList.innerHTML = '<div class="text-muted" style="padding:20px;">No hay productos aún.</div>';
                return;

            let html = '';
            productos.forEach(p => {
                const estado = p.activo !== false ? 'Activo' : 'Inactivo';
                const estadoClase = p.activo !== false ? 'estado-activo' : 'estado-inactivo';
                const imgSrc = p.imagenBase64 || 'https://placehold.co/55x55';
                html += `
                    <div class="list-item">
                        <img class="thumb" src="${imgSrc}" alt="${escapeHtml(p.nombre)}">
                        <div class="info">
                            <strong>${escapeHtml(p.nombre)}</strong>
                            <span class="small">${p.categoria || 'Sin cat.'}</span>
                            <span class="small">$ ${p.precio ? p.precio.toFixed(2) : '0.00'}</span>
                            <span class="small" style="color:${p.activo !== false ? '#39ff14' : '#ff3b5c'}">
                                ${p.activo !== false ? `Stock: ${p.stock ?? 0}` : 'INACTIVO'}
                            </span>
                        </div>
                        <div class="actions">
                            <button class="btn-neon" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i> Editar</button>
                            <button class="btn-neon danger" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                            <button class="btn-neon ${p.activo !== false ? 'danger' : 'success'}" onclick="toggleProductStatus('${p.id}')">
                                ${p.activo !== false ? 'Desactivar' : 'Activar'}
                            </button>
                        </div>
                    </div>
                `;
            });
            adminProductList.innerHTML = html;
        }

        function toggleProductStatus(id) {
            const p = productos.find(prod => prod.id == id);
            if (p) {
                p.activo = !(p.activo !== false);
                saveProductsToLocal();
                renderAdminProductList();
                renderProductos();
                showMessage(`Producto ${p.activo !== false ? 'activado' : 'desactivado'}`);
            }
        }

        function editProduct(id) {
            const p = productos.find(prod => prod.id == id);
            if (!p) return;
            editingId = p.id;
            document.getElementById('editId').value = p.id;
            prodName.value = p.nombre || '';
            prodCategory.value = p.categoria || '';
            prodDesc.value = p.descripcion || '';
            prodPrice.value = p.precio || '';
            prodStock.value = p.stock ?? 0;
            prodAvailable.checked = p.activo !== false;
            if (p.imagenBase64) {
                prodImagePreview.src = p.imagenBase64;
                prodImagePreview.style.display = 'block';
                existingImage.value = p.imagenBase64;
            } else {
                prodImagePreview.style.display = 'none';
                existingImage.value = '';
            }
            tempImageBase64 = '';
            prodImageFile.value = '';
            formSaveBtn.innerHTML = '<i class="fas fa-save"></i> Actualizar Producto';
            formCancelBtn.style.display = 'inline-flex';
            document.getElementById('productForm').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEdit() {
            clearForm();
            editingId = null;
            document.getElementById('editId').value = '';
            formSaveBtn.innerHTML = '<i class="fas fa-plus-circle"></i> Agregar Producto';
            formCancelBtn.style.display = 'none';
        }

        function clearForm() {
            prodName.value = '';
            prodCategory.value = '';
            prodDesc.value = '';
            prodPrice.value = '';
            prodStock.value = '';
            prodAvailable.checked = true;
            prodImageFile.value = '';
            prodImagePreview.style.display = 'none';
            tempImageBase64 = '';
            existingImage.value = '';
        }

        async function saveProduct() {
            const name = prodName.value.trim();
            const category = prodCategory.value.trim();
            const description = prodDesc.value.trim();
            const price = parseFloat(prodPrice.value);
            const stock = parseInt(prodStock.value) || 0;
            const available = prodAvailable.checked;
            const editIdVal = document.getElementById('editId').value;

            if (!name || isNaN(price) || price < 0) {
                showMessage('Completa nombre y precio válido', true);
                return;
            }

            let image = existingImage.value || '';
            if (tempImageBase64) {
                image = tempImageBase64;
            }

            // Manejar subida de archivo
            const file = prodImageFile.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    image = e.target.result;
                    saveProductData(name, category, description, price, stock, available, image, editIdVal);
                };
                reader.readAsDataURL(file);
                return;
            }

            saveProductData(name, category, description, price, stock, available, image, editIdVal);
        }

        function saveProductData(name, category, description, price, stock, available, image, editIdVal) {
            if (editIdVal) {
                const idx = productos.findIndex(p => p.id == editIdVal);
                if (idx !== -1) {
                    productos[idx] = {
                        ...productos[idx],
                        nombre: name,
                        categoria: category,
                        descripcion: description,
                        precio: price,
                        stock: stock,
                        activo: available,
                        imagenBase64: image || productos[idx].imagenBase64
                    };
                }
                showMessage('Producto actualizado');
            } else {
                const newProduct = {
                    id: Date.now(),
                    nombre: name,
                    categoria: category,
                    descripcion: description,
                    precio: price,
                    stock: stock,
                    activo: available,
                    imagenBase64: image || ''
                };
                productos.push(newProduct);
                showMessage('Producto agregado');
            }

            saveProductsToLocal();
            cancelEdit();
            actualizarFiltrosCategoria();
            renderProductos();
            renderAdminProductList();
            updateCartUI();
        }

        function deleteProduct(id) {
            if (!confirm('¿Eliminar permanentemente?')) return;
            productos = productos.filter(p => p.id != id);
            saveProductsToLocal();
            renderAdminProductList();
            renderProductos();
            actualizarFiltrosCategoria();
            showMessage('Producto eliminado');
        }

        // ============================================================
        //  CARRITO
        // ============================================================
        function openCartModal(productId) {
            const p = productos.find(prod => prod.id == productId);
            if (!p) return;
            if (p.activo === false || p.stock <= 0) {
                showMessage('Producto no disponible', true);
                return;
            }
            cartProductId = productId;
            cartProductInfo.innerHTML = `<strong>${escapeHtml(p.nombre)}</strong> · $ ${p.precio ? p.precio.toFixed(2) : '0.00'}/ud.`;
            cartMaxStock.textContent = p.stock || 0;
            cartQty.value = 1;
            cartQty.max = p.stock || 1;
            updateCartTotal();
            cartModal.classList.add('open');
        }

        function closeCartModal() {
            cartModal.classList.remove('open');
            cartProductId = null;
        }

        function updateCartTotal() {
            const p = productos.find(prod => prod.id == cartProductId);
            if (!p) return;
            const qty = parseInt(cartQty.value) || 1;
            const total = (p.precio || 0) * qty;
            cartTotalEl.textContent = total.toFixed(2) + ' USD';
        }

        cartQty.addEventListener('input', updateCartTotal);

        function confirmCart() {
            const phone = getPhoneNumber();
            if (!phone) {
                showMessage('Configura tu número de WhatsApp', true);
                return;
            }
            const p = productos.find(prod => prod.id == cartProductId);
            if (!p) return;
            const qty = parseInt(cartQty.value) || 1;
            if (qty < 1) {
                showMessage('Cantidad mínima 1', true);
                return;
            }
            if (qty > (p.stock || 0)) {
                showMessage(`Stock insuficiente. Disponible: ${p.stock}`, true);
                return;
            }
            const total = (p.precio || 0) * qty;
            const mensaje =
                `Hola, me gustaría realizar el siguiente pedido:\n` +
                `- Producto: ${p.nombre}\n` +
                `- Cantidad: ${qty}\n` +
                `- Precio unitario: $ ${p.precio ? p.precio.toFixed(2) : '0.00'}\n` +
                `- Total: $ ${total.toFixed(2)}\n\n` +
                `Gracias.`;

            const url = `https://wa.me/${phone}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
            closeCartModal();
            showMessage('Pedido enviado por WhatsApp');
        }

        // Cerrar modal al hacer clic fuera
        cartModal.addEventListener('click', function(e) {
            if (e.target === this) closeCartModal();
        });

        // ============================================================
        //  LIGHTBOX
        // ============================================================
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
                closeCartModal();
            }
        });

        // ============================================================
        //  INDICADOR DE SINCRONIZACIÓN
        // ============================================================
        function setSyncIndicator(status, message) {
            if (!syncIndicator) return;
            syncIndicator.className = 'sync-indicator';
            if (status === 'loading') {
                syncIndicator.innerHTML = `<i class="fas fa-sync-alt spinning"></i> ${message || 'Cargando...'}`;
            } else if (status === 'success') {
                syncIndicator.className = 'sync-indicator success';
                syncIndicator.innerHTML = `<i class="fas fa-check-circle"></i> ${message || 'Sincronizado'}`;
            } else if (status === 'error') {
                syncIndicator.className = 'sync-indicator error';
                syncIndicator.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message || 'Error'}`;
            } else {
                syncIndicator.innerHTML = `<i class="fas fa-circle"></i> Esperando...`;
            }
        }

        // ============================================================
        //  VISTAS (admin oculto)
        // ============================================================
        function switchView(view) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            if (view === 'catalog') {
                document.getElementById('catalogView').classList.add('active');
                renderProductos();
                history.pushState(null, '', '#/');
            } else if (view === 'admin') {
                document.getElementById('adminView').classList.add('active');
                renderAdminProductList();
                history.pushState(null, '', '#/admin');
            }
        }

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            if (hash === '#/admin') {
                switchView('admin');
            } else {
                switchView('catalog');
            }
        });

        // ============================================================
        //  INICIALIZACIÓN
        // ============================================================
        async function init() {
            // Cargar datos locales primero
            loadLocalData();

            // Configurar URL de importación
            if (importUrl) importUrl.value = remoteJsonUrl;

            // Renderizar categorías y productos con datos locales
            actualizarFiltrosCategoria();
            renderProductos();
            renderAdminProductList();
            updateCartUI();

            // Cargar desde JSON remoto automáticamente
            await loadProductsFromRemoteJson(true, true);

            // Manejar hash para admin
            const hash = window.location.hash;
            if (hash === '#/admin') {
                switchView('admin');
            } else {
                switchView('catalog');
            }

            // Evento para imagen local
            prodImageFile.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) {
                    tempImageBase64 = '';
                    prodImagePreview.style.display = 'none';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    tempImageBase64 = event.target.result;
                    prodImagePreview.src = tempImageBase64;
                    prodImagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            });
        }

        // Iniciar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', init);

        console.log('✅ NeoSolar · Sincronización adaptada al sistema MODA FIT');
        console.log('📦 Productos cargados:', productos.length);
        console.log('📱 Teléfono configurado:', getPhoneNumber());
        console.log('🔄 Sincronización automática al abrir la página.');
    </script>
</body>
