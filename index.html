<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ NeoSolar · Catálogo Futurista</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== RESET & GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #0b0e1a;
            color: #e0f0ff;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 30%, #112244 0%, #05070e 90%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0e1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 10px;
            box-shadow: 0 0 12px #00d4ff88;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            margin-bottom: 30px;
            background: rgba(10, 14, 30, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(0, 212, 255, 0.25);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #a855f7, #00d4ff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 4s linear infinite;
            letter-spacing: 2px;
        }
        @keyframes shineText {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .header .logo-icon {
            font-size: 2rem;
            margin-right: 10px;
            color: #00d4ff;
            filter: drop-shadow(0 0 8px #00d4ff);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-neon {
            background: transparent;
            border: 1.5px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 24px;
            border-radius: 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-neon:hover {
            background: #00d4ff;
            color: #0b0e1a;
            box-shadow: 0 0 30px #00d4ffaa;
            transform: scale(1.04);
        }
        .btn-neon.success {
            border-color: #39ff14;
            color: #39ff14;
        }
        .btn-neon.success:hover {
            background: #39ff14;
            color: #0b0e1a;
            box-shadow: 0 0 30px #39ff14aa;
        }
        .btn-neon.danger {
            border-color: #ff3b5c;
            color: #ff3b5c;
        }
        .btn-neon.danger:hover {
            background: #ff3b5c;
            color: #0b0e1a;
            box-shadow: 0 0 30px #ff3b5caa;
        }
        .btn-neon.admin {
            border-color: #a855f7;
            color: #a855f7;
        }
        .btn-neon.admin:hover {
            background: #a855f7;
            color: #0b0e1a;
            box-shadow: 0 0 30px #a855f7aa;
        }

        /* ===== VISTAS ===== */
        .view {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .view.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== CATÁLOGO ===== */
        .catalog-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
        }
        .catalog-header .filter {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .catalog-header .filter label {
            font-size: 0.8rem;
            color: #88aacc;
            letter-spacing: 1px;
        }
        .catalog-header .filter select {
            background: #0b0e1a;
            border: 1px solid #2a3a5a;
            border-radius: 40px;
            padding: 10px 20px;
            color: #e0f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .catalog-header .filter select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px #00d4ff44;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 35px;
            padding: 10px 0;
            min-height: 300px;
        }

        /* ===== TARJETAS ===== */
        .card {
            background: rgba(12, 18, 38, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px 18px 22px;
            transition: all 0.35s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 212, 255, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 30px;
            background: linear-gradient(135deg, #00d4ff33, #a855f733, #00d4ff33);
            background-size: 300% 300%;
            z-index: -1;
            animation: borderGlow 6s ease-in-out infinite;
            opacity: 0.6;
        }
        @keyframes borderGlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        .card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 50px rgba(0, 212, 255, 0.25), 0 0 40px rgba(0, 212, 255, 0.1);
            border-color: #00d4ff88;
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: #0a0d1a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .card-img-wrapper:hover {
            filter: brightness(1.05);
            border-color: #00d4ff66;
        }
        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0d1a;
            transition: 0.3s;
        }
        .card-img-wrapper .img-placeholder {
            font-size: 4rem;
            color: #2a3a5a;
            opacity: 0.5;
        }
        .card-img-wrapper::after {
            content: '🔍';
            position: absolute;
            bottom: 16px;
            right: 18px;
            font-size: 1.6rem;
            opacity: 0;
            transition: 0.3s;
            text-shadow: 0 0 20px #000;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            padding: 6px 10px;
            line-height: 1;
        }
        .card-img-wrapper:hover::after {
            opacity: 0.9;
        }

        .card-category {
            font-size: 0.65rem;
            color: #a855f7;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
            margin-bottom: 2px;
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 4px 0 6px;
            color: #f0f8ff;
            letter-spacing: 0.5px;
        }
        .card-desc {
            font-size: 0.85rem;
            font-weight: 400;
            color: #b0c8e0;
            line-height: 1.5;
            flex-grow: 1;
            margin-bottom: 12px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 0.2px;
        }
        .card-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #39ff14;
            text-shadow: 0 0 20px #39ff1466;
            margin: 6px 0 4px;
        }
        .card-price span {
            font-size: 0.9rem;
            color: #88aacc;
        }

        .card-stock {
            font-size: 0.75rem;
            color: #88aacc;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }
        .card-stock .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            background: #00d4ff22;
            border: 1px solid #00d4ff44;
            color: #00d4ff;
            font-weight: 600;
        }
        .card-stock .badge.agotado {
            background: #ff3b5c22;
            border-color: #ff3b5c66;
            color: #ff3b5c;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .card-actions .btn-neon {
            flex: 1;
            justify-content: center;
            padding: 12px 10px;
            font-size: 0.75rem;
        }
        .card-actions .btn-neon:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.4s ease;
            padding: 30px;
            cursor: zoom-out;
        }
        .lightbox.open {
            visibility: visible;
            opacity: 1;
        }
        .lightbox img {
            max-width: 92%;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 0 80px rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
            transition: transform 0.4s ease;
            background: #0a0d1a;
        }
        .lightbox.open img {
            transform: scale(1);
        }
        .lightbox .close-lightbox {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 3rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
            background: none;
            border: none;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px #000;
        }
        .lightbox .close-lightbox:hover {
            opacity: 1;
            transform: rotate(90deg);
        }
        .lightbox .lb-caption {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: #b0c8e0;
            font-size: 1.1rem;
            font-family: 'Segoe UI', sans-serif;
            padding: 0 20px;
            text-shadow: 0 0 20px #000;
            letter-spacing: 0.5px;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 380px;
            width: 100%;
        }
        .toast {
            background: rgba(10, 14, 30, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px 22px;
            border-left: 5px solid #00d4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 14px;
            transform: translateX(120%);
            animation: slideIn 0.5s ease forwards;
            color: #e0f0ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95rem;
        }
        .toast.success {
            border-left-color: #39ff14;
        }
        .toast.error {
            border-left-color: #ff3b5c;
        }
        .toast .toast-icon {
            font-size: 1.8rem;
        }
        .toast .toast-msg {
            flex: 1;
        }
        .toast .toast-close {
            background: none;
            border: none;
            color: #88aacc;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .toast .toast-close:hover {
            color: #fff;
        }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast.hide {
            animation: slideOut 0.4s ease forwards;
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }

        /* ===== ADMIN ===== */
        .admin-panel {
            background: rgba(10, 14, 30, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px;
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.08);
        }

        .admin-panel h2 {
            font-size: 1.6rem;
            color: #a855f7;
            text-shadow: 0 0 30px #a855f766;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(168, 85, 247, 0.15);
            margin-bottom: 40px;
        }
        .admin-form .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .admin-form label {
            font-size: 0.7rem;
            color: #a0b8d0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .admin-form input,
        .admin-form textarea,
        .admin-form select {
            background: #0b0e1a;
            border: 1px solid #2a3a5a;
            border-radius: 16px;
            padding: 12px 16px;
            color: #e0f0ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }
        .admin-form input:focus,
        .admin-form textarea:focus,
        .admin-form select:focus {
            border-color: #a855f7;
            box-shadow: 0 0 20px #a855f744;
        }
        .admin-form textarea {
            resize: vertical;
            min-height: 60px;
        }
        .admin-form .checkbox-field {
            flex-direction: row;
            align-items: center;
            gap: 12px;
        }
        .admin-form .checkbox-field input {
            width: 22px;
            height: 22px;
            accent-color: #a855f7;
        }
        .admin-form .file-field {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .admin-form .file-field input[type="file"] {
            background: transparent;
            border: none;
            padding: 8px 0;
            color: #a0b8d0;
            font-family: 'Segoe UI', sans-serif;
            flex: 1;
        }
        .admin-form .file-field .preview-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            background: #0f1322;
            border: 1px solid #2a3a5a;
        }

        .admin-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 8px;
            grid-column: 1 / -1;
        }

        .admin-list {
            margin-top: 30px;
        }
        .admin-list .list-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
            background: rgba(0, 0, 0, 0.25);
            padding: 14px 20px;
            border-radius: 20px;
            border-bottom: 1px solid rgba(168, 85, 247, 0.08);
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .admin-list .list-item:hover {
            background: rgba(168, 85, 247, 0.05);
        }
        .admin-list .list-item .info {
            flex: 1;
            min-width: 150px;
            font-size: 0.85rem;
        }
        .admin-list .list-item .info strong {
            color: #f0f8ff;
        }
        .admin-list .list-item .info .small {
            color: #88aacc;
            font-size: 0.7rem;
            margin-left: 12px;
        }
        .admin-list .list-item .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .admin-list .list-item .actions .btn-neon {
            padding: 6px 16px;
            font-size: 0.65rem;
        }
        .admin-list .list-item .thumb {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
            background: #0f1322;
            border: 1px solid #2a3a5a;
        }

        /* ===== IMPORT / EXPORT ===== */
        .io-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            padding: 20px 25px;
            margin-top: 30px;
            border: 1px solid rgba(168, 85, 247, 0.1);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
        }
        .io-section .io-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .io-section .io-group label {
            font-size: 0.7rem;
            color: #88aacc;
            letter-spacing: 1px;
        }
        .io-section .io-group input {
            background: #0b0e1a;
            border: 1px solid #2a3a5a;
            border-radius: 40px;
            padding: 10px 18px;
            color: #e0f0ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            outline: none;
            flex: 1;
            min-width: 200px;
        }
        .io-section .io-group input:focus {
            border-color: #a855f7;
        }

        /* ===== MODAL CARRITO ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .modal-overlay.open {
            visibility: visible;
            opacity: 1;
        }
        .modal-box {
            background: #121a2e;
            border-radius: 40px;
            padding: 35px 40px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(0, 212, 255, 0.25);
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.15);
            transform: scale(0.95);
            transition: 0.3s ease;
        }
        .modal-overlay.open .modal-box {
            transform: scale(1);
        }
        .modal-box h3 {
            font-size: 1.3rem;
            color: #00d4ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .modal-box .field {
            margin-bottom: 18px;
        }
        .modal-box .field label {
            display: block;
            font-size: 0.7rem;
            color: #88aacc;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .modal-box .field input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 20px;
            border: 1px solid #2a3a5a;
            background: #0b0e1a;
            color: #e0f0ff;
            font-size: 1rem;
            outline: none;
        }
        .modal-box .field input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px #00d4ff44;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            justify-content: flex-end;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                border-radius: 30px;
                padding: 18px;
            }
            .header h1 {
                font-size: 1.4rem;
                text-align: center;
            }
            .nav-buttons {
                justify-content: center;
            }
            .admin-form {
                grid-template-columns: 1fr;
            }
            .modal-box {
                padding: 25px 20px;
            }
            .catalog-header {
                flex-direction: column;
                align-items: stretch;
            }
            .io-section {
                flex-direction: column;
                align-items: stretch;
            }
            .catalog-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .card-img-wrapper {
                height: 220px;
            }
            .lightbox img {
                max-width: 96%;
                max-height: 65vh;
            }
            .lightbox .close-lightbox {
                top: 15px;
                right: 20px;
                font-size: 2.4rem;
            }
            .card-title {
                font-size: 1rem;
            }
            .card-price {
                font-size: 1.3rem;
            }
            .toast-container {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }

        .text-center {
            text-align: center;
        }
        .text-muted {
            color: #88aacc;
            font-size: 0.8rem;
        }
        .mt-20 {
            margin-top: 20px;
        }
        .loading-spinner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 0;
            gap: 15px;
            color: #00d4ff;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }
        .loading-spinner i {
            font-size: 2.5rem;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #88aacc;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .sync-indicator .fa-sync-alt {
            font-size: 0.8rem;
        }
        .sync-indicator .fa-sync-alt.spinning {
            animation: spin 1s linear infinite;
        }
        .sync-indicator.success {
            color: #39ff14;
            border-color: #39ff1444;
        }
        .sync-indicator.error {
            color: #ff3b5c;
            border-color: #ff3b5c44;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 15px;
            color: #88aacc;
            grid-column: 1 / -1;
            text-align: center;
        }
        .empty-state i {
            font-size: 4rem;
            opacity: 0.3;
        }
        .empty-state h3 {
            font-size: 1.2rem;
            color: #b0c8e0;
        }
        .empty-state p {
            font-size: 0.9rem;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div style="display:flex;align-items:center;gap:8px;">
            <span class="logo-icon"><i class="fas fa-solar-panel"></i></span>
            <h1>NEO·SOLAR</h1>
        </div>
        <div class="nav-buttons">
            <button class="btn-neon" id="btnCatalog" onclick="switchView('catalog')">
                <i class="fas fa-th"></i> Catálogo
            </button>
        </div>
    </header>

    <!-- ==================== VISTA CATÁLOGO ==================== -->
    <div id="catalogView" class="view active">
        <div class="catalog-header">
            <div class="filter">
                <label><i class="fas fa-tags"></i> Categoría:</label>
                <select id="categoryFilter" onchange="applyFilter()">
                    <option value="all">Todas</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <span class="text-muted" id="productCount">0 productos</span>
                <button class="btn-neon" onclick="manualSync()" style="padding:6px 14px; font-size:0.7rem;">
                    <i class="fas fa-sync-alt"></i> Actualizar ahora
                </button>
                <span id="syncIndicator" class="sync-indicator">
                    <i class="fas fa-circle"></i> Cargando...
                </span>
            </div>
        </div>
        <div id="catalogGrid" class="catalog-grid">
            <div class="loading-spinner" id="loadingSpinner">
                <i class="fas fa-sync-alt"></i>
                <span>Sincronizando catálogo (puede tardar varios minutos)...</span>
            </div>
        </div>
    </div>

    <!-- ==================== VISTA ADMIN (oculta, #/admin) ==================== -->
    <div id="adminView" class="view">
        <div class="admin-panel">
            <h2><i class="fas fa-cog" style="color:#a855f7;"></i> Panel de Control</h2>

            <!-- Configurar Teléfono -->
            <div style="background:rgba(0,0,0,0.2); padding:20px 25px; border-radius:30px; margin-bottom:30px; border:1px solid rgba(168,85,247,0.1);">
                <div style="display:flex; flex-wrap:wrap; align-items:center; gap:15px;">
                    <label style="font-size:0.8rem; color:#a0b8d0; letter-spacing:1px;">
                        <i class="fab fa-whatsapp" style="color:#25D366;"></i> NÚMERO WHATSAPP (código país, sin +):
                    </label>
                    <input type="text" id="phoneInput" placeholder="ej: 5358776771" style="flex:1; min-width:200px; background:#0b0e1a; border:1px solid #2a3a5a; border-radius:16px; padding:12px 18px; color:#e0f0ff; font-family:'Segoe UI',sans-serif; outline:none;">
                    <button class="btn-neon success" onclick="savePhoneNumber()"><i class="fas fa-save"></i> Guardar</button>
                    <span id="phoneStatus" style="font-size:0.75rem; color:#39ff14; margin-left:5px;"></span>
                </div>
            </div>

            <!-- Formulario Agregar / Editar -->
            <div class="admin-form" id="productForm">
                <div class="field">
                    <label><i class="fas fa-tag"></i> Nombre</label>
                    <input type="text" id="prodName" placeholder="Ej: Panel Solar 550W">
                </div>
                <div class="field">
                    <label><i class="fas fa-folder"></i> Categoría</label>
                    <input type="text" id="prodCategory" placeholder="Ej: Paneles, Inversores, Baterías">
                </div>
                <div class="field file-field">
                    <label><i class="fas fa-image"></i> Imagen (local)</label>
                    <input type="file" id="prodImageFile" accept="image/*">
                    <img id="prodImagePreview" class="preview-img" src="" alt="Vista previa" style="display:none;">
                </div>
                <div class="field">
                    <label><i class="fas fa-align-left"></i> Descripción</label>
                    <textarea id="prodDesc" placeholder="Breve descripción..."></textarea>
                </div>
                <div class="field">
                    <label><i class="fas fa-dollar-sign"></i> Precio (USD)</label>
                    <input type="number" id="prodPrice" placeholder="0.00" step="0.01">
                </div>
                <div class="field">
                    <label><i class="fas fa-boxes"></i> Stock</label>
                    <input type="number" id="prodStock" placeholder="Cantidad disponible" min="0">
                </div>
                <div class="field checkbox-field">
                    <label style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox" id="prodAvailable" checked>
                        <span>Disponible</span>
                    </label>
                </div>
                <div class="admin-actions">
                    <button class="btn-neon success" id="formSaveBtn" onclick="saveProduct()">
                        <i class="fas fa-plus-circle"></i> Agregar Producto
                    </button>
                    <button class="btn-neon" id="formCancelBtn" onclick="cancelEdit()" style="display:none;">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <input type="hidden" id="editId" value="">
                    <input type="hidden" id="existingImage" value="">
                </div>
            </div>

            <!-- Lista de productos en admin -->
            <div class="admin-list">
                <h3 style="color:#88aacc; font-size:1rem; margin-bottom:15px; letter-spacing:1px;">
                    <i class="fas fa-list-ul"></i> Productos registrados
                </h3>
                <div id="adminProductList"></div>
            </div>

            <!-- Sección Importar / Exportar JSON -->
            <div class="io-section">
                <div class="io-group">
                    <label><i class="fas fa-file-export"></i> Exportar JSON</label>
                    <button class="btn-neon success" onclick="exportJSON()"><i class="fas fa-download"></i> Descargar</button>
                </div>
                <div class="io-group">
                    <label><i class="fas fa-file-import"></i> Importar desde URL</label>
                    <input type="text" id="importUrl" placeholder="URL del JSON (ej: raw de GitHub)" value="https://raw.githubusercontent.com/costanorta-sys/neosolar/refs/heads/main/neosolar_catalog.json">
                    <button class="btn-neon admin" onclick="importFromURL()"><i class="fas fa-upload"></i> Cargar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== LIGHTBOX ==================== -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="close-lightbox" onclick="closeLightbox()">✕</button>
        <img id="lightboxImg" src="" alt="Vista ampliada">
        <div class="lb-caption" id="lightboxCaption"></div>
    </div>

    <!-- ==================== MODAL CARRITO ==================== -->
    <div class="modal-overlay" id="cartModal">
        <div class="modal-box">
            <h3><i class="fas fa-shopping-cart" style="color:#39ff14;"></i> Añadir al carrito</h3>
            <div id="cartProductInfo" style="margin-bottom:12px; font-size:0.9rem; color:#a0b8d0;"></div>
            <div class="field">
                <label>Cantidad (máx. <span id="cartMaxStock">0</span>)</label>
                <input type="number" id="cartQty" value="1" min="1" step="1">
            </div>
            <div style="font-size:0.9rem; color:#88aacc; margin-top:4px;">
                Total: <span id="cartTotal" style="color:#39ff14; font-weight:700;">0.00 USD</span>
            </div>
            <div class="modal-actions">
                <button class="btn-neon" onclick="closeCartModal()"><i class="fas fa-times"></i> Cancelar</button>
                <button class="btn-neon success" onclick="confirmCart()"><i class="fab fa-whatsapp"></i> Enviar por WhatsApp</button>
            </div>
        </div>
    </div>

    <!-- ==================== TOAST CONTAINER ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        //  CONFIGURACIÓN
        // ============================================================
        const DEFAULT_JSON_URL = 'https://raw.githubusercontent.com/costanorta-sys/neosolar/refs/heads/main/neosolar_catalog.json';
        const DEFAULT_PHONE = '5358776771';

        // Tiempos generosos pero sin exagerar (3 intentos, 60s timeout)
        const MAX_RETRIES = 3;
        const REQUEST_TIMEOUT = 60000; // 60 segundos por intento
        const RETRY_DELAY = 5000; // 5 segundos entre reintentos

        // ============================================================
        //  DATOS Y VARIABLES GLOBALES
        // ============================================================
        let products = [];
        let editingId = null;
        let cartProductId = null;
        let tempImageBase64 = '';
        let currentCategoryFilter = 'all';
        let syncInProgress = false;

        const PHONE_KEY = 'neosolar_phone';

        // ============================================================
        //  TOAST NOTIFICATIONS
        // ============================================================
        function showToast(message, type = 'success', duration = 7000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span class="toast-msg">${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('hide');
                    setTimeout(() => toast.remove(), 400);
                }
            }, duration);
        }

        // ============================================================
        //  INDEXEDDB WRAPPER
        // ============================================================
        const DB_NAME = 'NeoSolarDB';
        const STORE_NAME = 'products';
        const DB_VERSION = 1;
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                if (db) { resolve(db); return; }
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('category', 'category', { unique: false });
                    }
                };
                request.onsuccess = (event) => { db = event.target.result; resolve(db); };
                request.onerror = (event) => { reject(event.target.error); };
            });
        }

        async function getAllProducts() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveProducts(productsArray) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const clearRequest = store.clear();
                clearRequest.onsuccess = () => {
                    let inserted = 0;
                    if (productsArray.length === 0) { resolve(); return; }
                    productsArray.forEach((product) => {
                        const addRequest = store.add(product);
                        addRequest.onsuccess = () => {
                            inserted++;
                            if (inserted === productsArray.length) { resolve(); }
                        };
                        addRequest.onerror = (e) => { reject(e.target.error); };
                    });
                };
                clearRequest.onerror = (e) => { reject(e.target.error); };
            });
        }

        async function addProduct(product) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.add(product);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function updateProduct(product) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.put(product);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteProductById(id) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // ============================================================
        //  GESTIÓN DE DATOS
        // ============================================================
        async function loadProductsFromDB() {
            try {
                const data = await getAllProducts();
                if (data && data.length > 0) {
                    products = data;
                    console.log(`✅ Cargados ${products.length} productos desde IndexedDB`);
                    return true;
                } else {
                    products = [];
                    console.log('ℹ️ No hay productos en IndexedDB');
                    return false;
                }
            } catch (error) {
                console.error('❌ Error cargando IndexedDB:', error);
                products = [];
                return false;
            }
        }

        async function saveProductsToDB(productsArray) {
            try {
                await saveProducts(productsArray);
                console.log(`✅ ${productsArray.length} productos guardados en IndexedDB`);
                return true;
            } catch (error) {
                console.error('❌ Error guardando en IndexedDB:', error);
                showToast('Error guardando en IndexedDB: ' + error.message, 'error');
                return false;
            }
        }

        // ============================================================
        //  SINCRONIZACIÓN CON GITHUB (MEJORADA)
        // ============================================================
        async function syncFromGitHub(showToastMessage = true) {
            if (syncInProgress) {
                console.log('⏳ Sincronización ya en progreso...');
                return;
            }
            syncInProgress = true;
            setSyncIndicator('loading', 'Sincronizando...');

            // Mostrar spinner si no hay productos
            const grid = document.getElementById('catalogGrid');
            if (!grid.querySelector('#loadingSpinner')) {
                grid.innerHTML = `
                    <div class="loading-spinner" id="loadingSpinner">
                        <i class="fas fa-sync-alt"></i>
                        <span>Sincronizando catálogo (puede tardar varios minutos)...</span>
                    </div>
                `;
            }

            let attempt = 0;
            let success = false;
            let lastError = null;

            while (attempt < MAX_RETRIES && !success) {
                try {
                    console.log(`🌐 Intento ${attempt + 1}/${MAX_RETRIES} - ${DEFAULT_JSON_URL}`);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => {
                        console.warn(`⏰ Timeout en intento ${attempt + 1} (${REQUEST_TIMEOUT/1000}s)`);
                        controller.abort();
                    }, REQUEST_TIMEOUT);

                    const response = await fetch(DEFAULT_JSON_URL, {
                        signal: controller.signal,
                        cache: 'no-cache',
                        headers: {
                            'Cache-Control': 'no-cache',
                            'Pragma': 'no-cache',
                            'Accept': 'application/json'
                        }
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    console.log(`📦 Datos recibidos: ${data.length} productos`);

                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error('El JSON no contiene un array válido de productos');
                    }

                    // Validar estructura mínima
                    const validProducts = data.filter(p =>
                        p.id && p.name && typeof p.price === 'number'
                    );

                    if (validProducts.length === 0) {
                        throw new Error('No se encontraron productos válidos en el JSON');
                    }

                    products = validProducts;
                    const saved = await saveProductsToDB(products);
                    if (saved) {
                        success = true;
                        if (showToastMessage) {
                            showToast(`✅ Catálogo sincronizado: ${products.length} productos`, 'success');
                        }
                        setSyncIndicator('success', `${products.length} productos`);
                        console.log('✅ Sincronización completada con éxito');
                    } else {
                        throw new Error('Error al guardar en IndexedDB');
                    }

                } catch (error) {
                    lastError = error;
                    console.error(`❌ Error en intento ${attempt + 1}:`, error);
                    if (attempt < MAX_RETRIES - 1) {
                        const delay = RETRY_DELAY * (attempt + 1);
                        console.log(`🔄 Reintentando en ${delay/1000}s...`);
                        showToast(`⏳ Reintentando conexión... (${attempt + 1}/${MAX_RETRIES})`, 'info', 3000);
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }
                attempt++;
            }

            // Si no se pudo sincronizar
            if (!success) {
                console.error('❌ Todos los reintentos fallaron:', lastError);
                if (showToastMessage) {
                    showToast(`❌ Error al sincronizar: ${lastError ? lastError.message : 'Conexión fallida'}`, 'error');
                }
                setSyncIndicator('error', 'Error de sincronización');

                // Intentar cargar desde IndexedDB como respaldo
                const loaded = await loadProductsFromDB();
                if (loaded) {
                    if (showToastMessage) {
                        showToast('⚠️ Usando datos guardados localmente', 'error');
                    }
                    setSyncIndicator('error', 'Usando caché local');
                } else {
                    products = [];
                    setSyncIndicator('error', 'Sin datos');
                }
            }

            syncInProgress = false;
            // Renderizar siempre
            populateCategoryFilter();
            applyFilter();
            renderAdminList();

            // Eliminar spinner
            const spinner = document.getElementById('loadingSpinner');
            if (spinner) spinner.remove();
        }

        // ============================================================
        //  SINCRONIZACIÓN MANUAL (botón)
        // ============================================================
        async function manualSync() {
            if (syncInProgress) {
                showToast('Ya hay una sincronización en curso...', 'info');
                return;
            }
            await syncFromGitHub(true);
        }

        // ============================================================
        //  INICIALIZACIÓN
        // ============================================================
        async function initialize() {
            // Configurar teléfono por defecto
            document.getElementById('phoneInput').value = DEFAULT_PHONE;
            if (!localStorage.getItem(PHONE_KEY)) {
                localStorage.setItem(PHONE_KEY, DEFAULT_PHONE);
            }
            updatePhoneStatus();

            // Configurar URL de importación
            document.getElementById('importUrl').value = DEFAULT_JSON_URL;

            // Intentar cargar desde IndexedDB primero (rápido)
            const hasLocal = await loadProductsFromDB();
            if (hasLocal) {
                // Mostrar datos locales inmediatamente
                populateCategoryFilter();
                applyFilter();
                renderAdminList();
                setSyncIndicator('success', `${products.length} productos (caché)`);
                // Sincronizar en segundo plano
                setTimeout(() => {
                    syncFromGitHub(true);
                }, 800);
            } else {
                // No hay datos locales, sincronizar directamente
                await syncFromGitHub(true);
            }

            // Manejar hash para admin
            const hash = window.location.hash;
            if (hash === '#/admin') {
                switchView('admin');
            } else {
                switchView('catalog');
            }
        }

        // ============================================================
        //  VISTAS
        // ============================================================
        function switchView(view) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            if (view === 'catalog') {
                document.getElementById('catalogView').classList.add('active');
                renderCatalog();
                history.pushState(null, '', '#/');
            } else if (view === 'admin') {
                document.getElementById('adminView').classList.add('active');
                renderAdminList();
                history.pushState(null, '', '#/admin');
            }
        }

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            if (hash === '#/admin') {
                switchView('admin');
            } else {
                switchView('catalog');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            initialize();
            document.getElementById('prodImageFile').addEventListener('change', handleFileSelect);
        });

        // ============================================================
        //  IMAGEN LOCAL
        // ============================================================
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) {
                tempImageBase64 = '';
                document.getElementById('prodImagePreview').style.display = 'none';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(event) {
                tempImageBase64 = event.target.result;
                const preview = document.getElementById('prodImagePreview');
                preview.src = tempImageBase64;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // ============================================================
        //  LIGHTBOX
        // ============================================================
        function openLightbox(imgSrc, caption) {
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightboxImg').src = imgSrc;
            document.getElementById('lightboxCaption').textContent = caption || '';
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
                closeCartModal();
            }
        });

        // ============================================================
        //  CATÁLOGO Y FILTROS
        // ============================================================
        function populateCategoryFilter() {
            const select = document.getElementById('categoryFilter');
            const categories = new Set(products.map(p => p.category).filter(c => c && c.trim() !== ''));
            select.innerHTML = '<option value="all">Todas</option>';
            categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                select.appendChild(opt);
            });
            if (currentCategoryFilter !== 'all' && categories.has(currentCategoryFilter)) {
                select.value = currentCategoryFilter;
            } else {
                select.value = 'all';
                currentCategoryFilter = 'all';
            }
        }

        function applyFilter() {
            const select = document.getElementById('categoryFilter');
            currentCategoryFilter = select.value;
            renderCatalog();
        }

        function renderCatalog() {
            const grid = document.getElementById('catalogGrid');
            if (document.getElementById('loadingSpinner')) return;
            grid.innerHTML = '';

            let filtered = products;
            if (currentCategoryFilter !== 'all') {
                filtered = products.filter(p => p.category === currentCategoryFilter);
            }

            if (filtered.length === 0) {
                document.getElementById('productCount').textContent = '0 productos';
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>No hay productos</h3>
                        <p>El catálogo está vacío. Presiona "Actualizar ahora" para sincronizar con GitHub.</p>
                    </div>
                `;
                return;
            }
            document.getElementById('productCount').textContent = filtered.length + ' productos';

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';

                const imgWrapper = document.createElement('div');
                imgWrapper.className = 'card-img-wrapper';
                if (p.image && p.image.startsWith('data:')) {
                    const img = document.createElement('img');
                    img.src = p.image;
                    img.alt = p.name;
                    img.loading = 'lazy';
                    imgWrapper.appendChild(img);
                    imgWrapper.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openLightbox(p.image, p.name + ' · ' + (p.category || ''));
                    });
                } else {
                    const placeholder = document.createElement('div');
                    placeholder.className = 'img-placeholder';
                    placeholder.innerHTML = '<i class="fas fa-image"></i>';
                    imgWrapper.appendChild(placeholder);
                }

                const stockText = p.available && p.stock > 0 ?
                    `<span class="badge"><i class="fas fa-check-circle" style="color:#39ff14;"></i> ${p.stock} uds.</span>` :
                    `<span class="badge agotado"><i class="fas fa-times-circle"></i> AGOTADO</span>`;

                const disabledAttr = (!p.available || p.stock <= 0) ? 'disabled' : '';

                card.innerHTML = `
                    <div class="card-category">${p.category || 'Sin categoría'}</div>
                    <div class="card-title">${p.name}</div>
                    <div class="card-desc">${p.description || 'Sin descripción'}</div>
                    <div class="card-price">$ ${p.price.toFixed(2)}</div>
                    <div class="card-stock">${stockText}</div>
                    <div class="card-actions">
                        <button class="btn-neon" ${disabledAttr} onclick="openCartModal('${p.id}')">
                            <i class="fas fa-cart-plus"></i> Añadir
                        </button>
                    </div>
                `;

                card.prepend(imgWrapper);
                grid.appendChild(card);
            });
        }

        // ============================================================
        //  ADMIN: LISTA Y CRUD
        // ============================================================
        function renderAdminList() {
            const container = document.getElementById('adminProductList');
            container.innerHTML = '';
            if (products.length === 0) {
                container.innerHTML = `<div class="text-muted" style="padding:20px;">No hay productos aún.</div>`;
                return;
            }
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'list-item';
                const thumb = p.image && p.image.startsWith('data:') ?
                    `<img class="thumb" src="${p.image}" alt="${p.name}">` :
                    `<div class="thumb" style="display:flex;align-items:center;justify-content:center;color:#2a3a5a;"><i class="fas fa-image"></i></div>`;
                div.innerHTML = `
                    ${thumb}
                    <div class="info">
                        <strong>${p.name}</strong>
                        <span class="small">${p.category || 'Sin cat.'}</span>
                        <span class="small">$ ${p.price.toFixed(2)}</span>
                        <span class="small" style="color:${p.available && p.stock>0 ? '#39ff14' : '#ff3b5c'}">
                            ${p.available && p.stock>0 ? `Stock: ${p.stock}` : 'AGOTADO'}
                        </span>
                    </div>
                    <div class="actions">
                        <button class="btn-neon" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i> Editar</button>
                        <button class="btn-neon danger" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function saveProduct() {
            const name = document.getElementById('prodName').value.trim();
            const category = document.getElementById('prodCategory').value.trim();
            const description = document.getElementById('prodDesc').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value);
            const stock = parseInt(document.getElementById('prodStock').value) || 0;
            const available = document.getElementById('prodAvailable').checked;
            const editId = document.getElementById('editId').value;

            let image = document.getElementById('existingImage').value;
            if (tempImageBase64) {
                image = tempImageBase64;
            }

            if (!name || isNaN(price) || price < 0) {
                alert('Por favor, completa el nombre y un precio válido.');
                return;
            }

            try {
                if (editId) {
                    const idx = products.findIndex(p => p.id === editId);
                    if (idx !== -1) {
                        const updated = { ...products[idx], name, category, image, description, price, stock, available };
                        products[idx] = updated;
                        await updateProduct(updated);
                        showToast('Producto actualizado correctamente', 'success');
                    }
                    document.getElementById('editId').value = '';
                    document.getElementById('formSaveBtn').innerHTML = '<i class="fas fa-plus-circle"></i> Agregar Producto';
                    document.getElementById('formCancelBtn').style.display = 'none';
                } else {
                    const newProduct = {
                        id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
                        name,
                        category,
                        image: image || '',
                        description,
                        price,
                        stock,
                        available
                    };
                    products.push(newProduct);
                    await addProduct(newProduct);
                    showToast('Producto agregado correctamente', 'success');
                }
            } catch (error) {
                console.error('Error guardando producto:', error);
                showToast('Error al guardar: ' + error.message, 'error');
                return;
            }

            clearForm();
            populateCategoryFilter();
            applyFilter();
            renderAdminList();
        }

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            if (!p) return;
            document.getElementById('prodName').value = p.name;
            document.getElementById('prodCategory').value = p.category || '';
            document.getElementById('prodDesc').value = p.description || '';
            document.getElementById('prodPrice').value = p.price;
            document.getElementById('prodStock').value = p.stock;
            document.getElementById('prodAvailable').checked = p.available;
            document.getElementById('editId').value = p.id;
            document.getElementById('existingImage').value = p.image || '';
            const preview = document.getElementById('prodImagePreview');
            if (p.image && p.image.startsWith('data:')) {
                preview.src = p.image;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
            tempImageBase64 = '';
            document.getElementById('prodImageFile').value = '';
            document.getElementById('formSaveBtn').innerHTML = '<i class="fas fa-save"></i> Actualizar Producto';
            document.getElementById('formCancelBtn').style.display = 'inline-flex';
            document.getElementById('productForm').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEdit() {
            clearForm();
            document.getElementById('editId').value = '';
            document.getElementById('formSaveBtn').innerHTML = '<i class="fas fa-plus-circle"></i> Agregar Producto';
            document.getElementById('formCancelBtn').style.display = 'none';
        }

        async function deleteProduct(id) {
            if (!confirm('¿Eliminar este producto permanentemente?')) return;
            try {
                await deleteProductById(id);
                products = products.filter(p => p.id !== id);
                showToast('Producto eliminado', 'error');
                renderAdminList();
                populateCategoryFilter();
                applyFilter();
            } catch (error) {
                console.error('Error eliminando:', error);
                showToast('Error al eliminar: ' + error.message, 'error');
            }
        }

        function clearForm() {
            document.getElementById('prodName').value = '';
            document.getElementById('prodCategory').value = '';
            document.getElementById('prodDesc').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodStock').value = '';
            document.getElementById('prodAvailable').checked = true;
            document.getElementById('editId').value = '';
            document.getElementById('existingImage').value = '';
            document.getElementById('prodImageFile').value = '';
            document.getElementById('prodImagePreview').style.display = 'none';
            tempImageBase64 = '';
        }

        // ============================================================
        //  TELÉFONO
        // ============================================================
        function savePhoneNumber() {
            const val = document.getElementById('phoneInput').value.trim();
            localStorage.setItem(PHONE_KEY, val);
            updatePhoneStatus();
            showToast('Número de WhatsApp guardado', 'success');
        }

        function updatePhoneStatus() {
            const phone = localStorage.getItem(PHONE_KEY) || DEFAULT_PHONE;
            const status = document.getElementById('phoneStatus');
            if (phone) {
                status.innerHTML = `<i class="fas fa-check-circle"></i> Configurado: +${phone}`;
                status.style.color = '#39ff14';
            } else {
                status.innerHTML = `<i class="fas fa-exclamation-triangle"></i> No configurado`;
                status.style.color = '#ffaa33';
            }
        }

        function getPhoneNumber() {
            return localStorage.getItem(PHONE_KEY) || DEFAULT_PHONE;
        }

        // ============================================================
        //  IMPORTAR / EXPORTAR JSON
        // ============================================================
        function exportJSON() {
            const dataStr = JSON.stringify(products, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'neosolar_catalog.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('JSON exportado correctamente', 'success');
        }

        async function importFromURL() {
            const url = document.getElementById('importUrl').value.trim();
            if (!url) {
                alert('Ingresa una URL válida.');
                return;
            }
            if (!confirm('Esto reemplazará todos los productos actuales. ¿Continuar?')) return;

            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = `
                <div class="loading-spinner" id="loadingSpinner">
                    <i class="fas fa-sync-alt"></i>
                    <span>Importando desde URL...</span>
                </div>
            `;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Error al obtener el archivo');
                const data = await response.json();
                if (!Array.isArray(data)) throw new Error('El formato no es un array de productos');
                products = data;
                await saveProductsToDB(products);
                showToast('Importación exitosa desde URL', 'success');
                clearForm();
                renderAdminList();
                populateCategoryFilter();
                applyFilter();
            } catch (error) {
                showToast('Error al importar: ' + error.message, 'error');
            } finally {
                const spinner = document.getElementById('loadingSpinner');
                if (spinner) spinner.remove();
            }
        }

        // ============================================================
        //  CARRITO (MODAL)
        // ============================================================
        function openCartModal(productId) {
            const p = products.find(prod => prod.id === productId);
            if (!p) return;
            if (!p.available || p.stock <= 0) {
                alert('Este producto no está disponible.');
                return;
            }
            cartProductId = productId;
            document.getElementById('cartProductInfo').innerHTML =
                `<strong>${p.name}</strong> · $ ${p.price.toFixed(2)}/ud.`;
            document.getElementById('cartMaxStock').textContent = p.stock;
            document.getElementById('cartQty').value = 1;
            document.getElementById('cartQty').max = p.stock;
            updateCartTotal();
            document.getElementById('cartModal').classList.add('open');
        }

        function closeCartModal() {
            document.getElementById('cartModal').classList.remove('open');
            cartProductId = null;
        }

        function updateCartTotal() {
            const p = products.find(prod => prod.id === cartProductId);
            if (!p) return;
            const qty = parseInt(document.getElementById('cartQty').value) || 1;
            const total = p.price * qty;
            document.getElementById('cartTotal').textContent = total.toFixed(2) + ' USD';
        }

        document.getElementById('cartQty').addEventListener('input', updateCartTotal);

        function confirmCart() {
            const phone = getPhoneNumber();
            if (!phone) {
                alert('Configura tu número de teléfono en el panel de administración.');
                return;
            }
            const p = products.find(prod => prod.id === cartProductId);
            if (!p) return;
            const qty = parseInt(document.getElementById('cartQty').value) || 1;
            if (qty < 1) {
                alert('La cantidad debe ser al menos 1.');
                return;
            }
            if (qty > p.stock) {
                alert(`No hay suficiente stock. Disponible: ${p.stock}`);
                return;
            }
            const total = p.price * qty;
            const mensaje =
                `Hola, me gustaría realizar el siguiente pedido:\n` +
                `- Producto: ${p.name}\n` +
                `- Cantidad: ${qty}\n` +
                `- Precio unitario: $ ${p.price.toFixed(2)}\n` +
                `- Total: $ ${total.toFixed(2)}\n\n` +
                `Gracias.`;

            const url = `https://wa.me/${phone}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
            closeCartModal();
            showToast('Pedido enviado por WhatsApp', 'success');
        }

        document.getElementById('cartModal').addEventListener('click', function(e) {
            if (e.target === this) closeCartModal();
        });

        // ============================================================
        //  INDICADOR DE SINCRONIZACIÓN
        // ============================================================
        function setSyncIndicator(status, message) {
            const el = document.getElementById('syncIndicator');
            el.className = 'sync-indicator';
            if (status === 'loading') {
                el.innerHTML = `<i class="fas fa-sync-alt spinning"></i> ${message || 'Cargando...'}`;
            } else if (status === 'success') {
                el.className = 'sync-indicator success';
                el.innerHTML = `<i class="fas fa-check-circle"></i> ${message || 'Sincronizado'}`;
            } else if (status === 'error') {
                el.className = 'sync-indicator error';
                el.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message || 'Error'}`;
            } else {
                el.innerHTML = `<i class="fas fa-circle"></i> Esperando...`;
            }
        }

        console.log('✅ NeoSolar · Lógica de sincronización revisada y simplificada');
        console.log('📦 Productos cargados:', products.length);
        console.log('📱 Teléfono configurado:', getPhoneNumber());
        console.log('🔘 Botón "Actualizar ahora" para forzar sincronización manual.');
    </script>
