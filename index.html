<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚡ NEO·SOLAR · Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== RESET ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: #0b0e1a;
            color: #e0f0ff;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 30%, #112244 0%, #05070e 90%);
            background-attachment: fixed;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0e1a; }
        ::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; box-shadow: 0 0 12px #00d4ff88; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            margin-bottom: 30px;
            background: rgba(10, 14, 30, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(0, 212, 255, 0.25);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #a855f7, #00d4ff);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shineText 4s linear infinite;
            letter-spacing: 2px;
        }
        @keyframes shineText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header .logo-icon { font-size: 2rem; margin-right: 10px; color: #00d4ff; filter: drop-shadow(0 0 8px #00d4ff); }
        .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-neon {
            background: transparent;
            border: 1.5px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 24px;
            border-radius: 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-neon:hover { background: #00d4ff; color: #0b0e1a; box-shadow: 0 0 30px #00d4ffaa; transform: scale(1.04); }
        .btn-neon.success { border-color: #39ff14; color: #39ff14; }
        .btn-neon.success:hover { background: #39ff14; color: #0b0e1a; box-shadow: 0 0 30px #39ff14aa; }
        .btn-neon.danger { border-color: #ff3b5c; color: #ff3b5c; }
        .btn-neon.danger:hover { background: #ff3b5c; color: #0b0e1a; box-shadow: 0 0 30px #ff3b5caa; }
        .btn-neon.admin { border-color: #a855f7; color: #a855f7; }
        .btn-neon.admin:hover { background: #a855f7; color: #0b0e1a; box-shadow: 0 0 30px #a855f7aa; }

        .view { display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

        .catalog-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
        }
        .catalog-header .filter { display: flex; align-items: center; gap: 12px; }
        .catalog-header .filter label { font-size: 0.8rem; color: #88aacc; letter-spacing: 1px; }
        .catalog-header .filter select {
            background: #0b0e1a;
            border: 1px solid #2a3a5a;
            border-radius: 40px;
            padding: 10px 20px;
            color: #e0f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .catalog-header .filter select:focus { border-color: #00d4ff; box-shadow: 0 0 20px #00d4ff44; }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px;
            padding: 10px 0;
            min-height: 300px;
        }

        .card {
            background: rgba(12, 18, 38, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px 18px 22px;
            transition: all 0.35s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 212, 255, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 30px;
            background: linear-gradient(135deg, #00d4ff33, #a855f733, #00d4ff33);
            background-size: 300% 300%;
            z-index: -1;
            animation: borderGlow 6s ease-in-out infinite;
            opacity: 0.6;
        }
        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 50px rgba(0, 212, 255, 0.25), 0 0 40px rgba(0, 212, 255, 0.1);
            border-color: #00d4ff88;
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            height: 260px;
            border-radius: 20px;
            overflow: hidden;
            background: #0a0d1a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .card-img-wrapper:hover { filter: brightness(1.05); border-color: #00d4ff66; }
        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0d1a;
            transition: 0.3s;
        }
        .card-img-wrapper .img-placeholder { font-size: 4rem; color: #2a3a5a; opacity: 0.5; }
        .card-img-wrapper::after {
            content: '🔍';
            position: absolute;
            bottom: 16px;
            right: 18px;
            font-size: 1.6rem;
            opacity: 0;
            transition: 0.3s;
            text-shadow: 0 0 20px #000;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            padding: 6px 10px;
            line-height: 1;
        }
        .card-img-wrapper:hover::after { opacity: 0.9; }

        .card-category { font-size: 0.65rem; color: #a855f7; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; margin-bottom: 2px; }
        .card-title { font-size: 1.15rem; font-weight: 700; margin: 4px 0 6px; color: #f0f8ff; letter-spacing: 0.5px; }
        .card-desc { font-size: 0.85rem; font-weight: 400; color: #b0c8e0; line-height: 1.5; flex-grow: 1; margin-bottom: 12px; font-family: 'Segoe UI', sans-serif; letter-spacing: 0.2px; }
        .card-price { font-size: 1.5rem; font-weight: 700; color: #39ff14; text-shadow: 0 0 20px #39ff1466; margin: 6px 0 4px; }
        .card-price span { font-size: 0.9rem; color: #88aacc; }
        .card-stock { font-size: 0.75rem; color: #88aacc; margin-bottom: 14px; letter-spacing: 0.5px; }
        .card-stock .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            background: #00d4ff22;
            border: 1px solid #00d4ff44;
            color: #00d4ff;
            font-weight: 600;
        }
        .card-stock .badge.agotado { background: #ff3b5c22; border-color: #ff3b5c66; color: #ff3b5c; }
        .card-actions { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
        .card-actions .btn-neon { flex: 1; justify-content: center; padding: 12px 10px; font-size: 0.75rem; }
        .card-actions .btn-neon:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.4s ease;
            padding: 30px;
            cursor: zoom-out;
        }
        .lightbox.open { visibility: visible; opacity: 1; }
        .lightbox img {
            max-width: 92%;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 0 80px rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
            transition: transform 0.4s ease;
            background: #0a0d1a;
        }
        .lightbox.open img { transform: scale(1); }
        .lightbox .close-lightbox {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 3rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
            background: none;
            border: none;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px #000;
        }
        .lightbox .close-lightbox:hover { opacity: 1; transform: rotate(90deg); }
        .lightbox .lb-caption {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: #b0c8e0;
            font-size: 1.1rem;
            font-family: 'Segoe UI', sans-serif;
            padding: 0 20px;
            text-shadow: 0 0 20px #000;
            letter-spacing: 0.5px;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 2000;
            animation: fadeOut 4s forwards;
            text-align: center;
            font-size: 0.9rem;
            max-width: 90%;
            font-family: 'Segoe UI', sans-serif;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .toast-msg i { margin-right: 10px; }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; transform: translateX(-50%) translateY(20px); }
        }

        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #88aacc;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .sync-indicator .fa-sync-alt { font-size: 0.8rem; }
        .sync-indicator .fa-sync-alt.spinning { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sync-indicator.success { color: #39ff14; border-color: #39ff1444; }
        .sync-indicator.error { color: #ff3b5c; border-color: #ff3b5c44; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 15px;
            color: #88aacc;
            grid-column: 1 / -1;
            text-align: center;
        }
        .empty-state i { font-size: 4rem; opacity: 0.3; }
        .empty-state h3 { font-size: 1.2rem; color: #b0c8e0; }
        .empty-state p { font-size: 0.9rem; max-width: 400px; }

        /* ===== ADMIN ===== */
        .admin-panel {
            background: rgba(10, 14, 30, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px;
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.08);
            margin-top: 20px;
        }
        .admin-panel h2 { font-size: 1.6rem; color: #a855f7; text-shadow: 0 0 30px #a855f766; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(168, 85, 247, 0.15);
            margin-bottom: 40px;
        }
        .admin-form .field { display: flex; flex-direction: column; gap: 4px; }
        .admin-form label { font-size: 0.7rem; color: #a0b8d0; letter-spacing: 1px; text-transform: uppercase; }
        .admin-form input, .admin-form textarea, .admin-form select {
            background: #0b0e1a;
            border: 1px solid #2a3a5a;
            border-radius: 16px;
            padding: 12px 16px;
            color: #e0f0ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }
        .admin-form input:focus, .admin-form textarea:focus, .admin-form select:focus { border-color: #a855f7; box-shadow: 0 0 20px #a855f744; }
        .admin-form textarea { resize: vertical; min-height: 60px; }
        .admin-form .checkbox-field { flex-direction: row; align-items: center; gap: 12px; }
        .admin-form .checkbox-field input { width: 22px; height: 22px; accent-color: #a855f7; }
        .admin-form .file-field { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .admin-form .file-field input[type="file"] { background: transparent; border: none; padding: 8px 0; color: #a0b8d0; font-family: 'Segoe UI', sans-serif; flex: 1; }
        .admin-form .file-field .preview-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; background: #0f1322; border: 1px solid #2a3a5a; }
        .admin-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 8px; grid-column: 1 / -1; }
        .admin-list { margin-top: 30px; }
        .admin-list .list-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
            background: rgba(0, 0, 0, 0.25);
            padding: 14px 20px;
            border-radius: 20px;
            border-bottom: 1px solid rgba(168, 85, 247, 0.08);
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .admin-list .list-item:hover { background: rgba(168, 85, 247, 0.05); }
        .admin-list .list-item .info { flex: 1; min-width: 150px; font-size: 0.85rem; }
        .admin-list .list-item .info strong { color: #f0f8ff; }
        .admin-list .list-item .info .small { color: #88aacc; font-size: 0.7rem; margin-left: 12px; }
        .admin-list .list-item .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-list .list-item .actions .btn-neon { padding: 6px 16px; font-size: 0.65rem; }
        .admin-list .list-item .thumb { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #0f1322; border: 1px solid #2a3a5a; }
        .io-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            padding: 20px 25px;
            margin-top: 30px;
            border: 1px solid rgba(168, 85, 247, 0.1);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
        }
        .io-section .io-group { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; flex: 1; }
        .io-section .io-group label { font-size: 0.7rem; color: #88aacc; letter-spacing: 1px; }
        .io-section .io-group input {
            background: #0b0e1a;
            border: 1px solid #2a3a5a;
            border-radius: 40px;
            padding: 10px 18px;
            color: #e0f0ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            outline: none;
            flex: 1;
            min-width: 200px;
        }
        .io-section .io-group input:focus { border-color: #a855f7; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .modal-overlay.open { visibility: visible; opacity: 1; }
        .modal-box {
            background: #121a2e;
            border-radius: 40px;
            padding: 35px 40px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(0, 212, 255, 0.25);
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.15);
            transform: scale(0.95);
            transition: 0.3s ease;
        }
        .modal-overlay.open .modal-box { transform: scale(1); }
        .modal-box h3 { font-size: 1.3rem; color: #00d4ff; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .modal-box .field { margin-bottom: 18px; }
        .modal-box .field label { display: block; font-size: 0.7rem; color: #88aacc; letter-spacing: 1px; margin-bottom: 4px; }
        .modal-box .field input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 20px;
            border: 1px solid #2a3a5a;
            background: #0b0e1a;
            color: #e0f0ff;
            font-size: 1rem;
            outline: none;
        }
        .modal-box .field input:focus { border-color: #00d4ff; box-shadow: 0 0 20px #00d4ff44; }
        .modal-actions { display: flex; gap: 12px; margin-top: 25px; justify-content: flex-end; }

        @media (max-width: 640px) {
            .header { flex-direction: column; align-items: stretch; border-radius: 30px; padding: 18px; }
            .header h1 { font-size: 1.4rem; text-align: center; }
            .nav-buttons { justify-content: center; }
            .admin-form { grid-template-columns: 1fr; }
            .modal-box { padding: 25px 20px; }
            .catalog-header { flex-direction: column; align-items: stretch; }
            .io-section { flex-direction: column; align-items: stretch; }
            .catalog-grid { grid-template-columns: 1fr; gap: 25px; }
            .card-img-wrapper { height: 220px; }
            .lightbox img { max-width: 96%; max-height: 65vh; }
            .lightbox .close-lightbox { top: 15px; right: 20px; font-size: 2.4rem; }
            .card-title { font-size: 1rem; }
            .card-price { font-size: 1.3rem; }
        }
        .text-center { text-align: center; }
        .text-muted { color: #88aacc; font-size: 0.8rem; }
        .mt-20 { margin-top: 20px; }
        .loading-spinner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 0;
            gap: 15px;
            color: #00d4ff;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }
        .loading-spinner i { font-size: 2.5rem; animation: spin 1.2s linear infinite; }
    </style>
</head>
<body>

    <header class="header">
        <div style="display:flex;align-items:center;gap:8px;">
            <span class="logo-icon"><i class="fas fa-solar-panel"></i></span>
            <h1>NEO·SOLAR</h1>
        </div>
        <div class="nav-buttons">
            <button class="btn-neon" id="btnCatalog" onclick="switchView('catalog')">
                <i class="fas fa-th"></i> Catálogo
            </button>
        </div>
    </header>

    <!-- ===== CATÁLOGO ===== -->
    <div id="catalogView" class="view active">
        <div class="catalog-header">
            <div class="filter">
                <label><i class="fas fa-tags"></i> Categoría:</label>
                <select id="categoryFilter" onchange="applyFilter()">
                    <option value="all">Todas</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <span class="text-muted" id="productCount">0 productos</span>
                <button class="btn-neon" onclick="forceSync()" style="padding:6px 14px; font-size:0.7rem;">
                    <i class="fas fa-sync-alt"></i> Actualizar
                </button>
                <span id="syncIndicator" class="sync-indicator">
                    <i class="fas fa-circle"></i> Cargando...
                </span>
            </div>
        </div>
        <div id="catalogGrid" class="catalog-grid">
            <div class="loading-spinner" id="loadingSpinner">
                <i class="fas fa-sync-alt"></i>
                <span>Cargando catálogo...</span>
            </div>
        </div>
    </div>

    <!-- ===== ADMIN (oculto, #/admin) ===== -->
    <div id="adminView" class="view">
        <div class="admin-panel">
            <h2><i class="fas fa-cog" style="color:#a855f7;"></i> Panel de Control</h2>
            <!-- Configurar Teléfono -->
            <div style="background:rgba(0,0,0,0.2); padding:20px 25px; border-radius:30px; margin-bottom:30px; border:1px solid rgba(168,85,247,0.1);">
                <div style="display:flex; flex-wrap:wrap; align-items:center; gap:15px;">
                    <label style="font-size:0.8rem; color:#a0b8d0; letter-spacing:1px;">
                        <i class="fab fa-whatsapp" style="color:#25D366;"></i> NÚMERO WHATSAPP (código país, sin +):
                    </label>
                    <input type="text" id="phoneInput" placeholder="ej: 5358776771" style="flex:1; min-width:200px; background:#0b0e1a; border:1px solid #2a3a5a; border-radius:16px; padding:12px 18px; color:#e0f0ff; font-family:'Segoe UI',sans-serif; outline:none;">
                    <button class="btn-neon success" onclick="savePhoneNumber()"><i class="fas fa-save"></i> Guardar</button>
                    <span id="phoneStatus" style="font-size:0.75rem; color:#39ff14; margin-left:5px;"></span>
                </div>
            </div>
            <!-- Formulario -->
            <div class="admin-form" id="productForm">
                <div class="field"><label>Nombre</label><input type="text" id="prodName" placeholder="Ej: Panel Solar"></div>
                <div class="field"><label>Categoría</label><input type="text" id="prodCategory" placeholder="Ej: Paneles"></div>
                <div class="field file-field">
                    <label>Imagen</label>
                    <input type="file" id="prodImageFile" accept="image/*">
                    <img id="prodImagePreview" class="preview-img" src="" style="display:none;">
                </div>
                <div class="field"><label>Descripción</label><textarea id="prodDesc" placeholder="Breve descripción"></textarea></div>
                <div class="field"><label>Precio (USD)</label><input type="number" id="prodPrice" step="0.01" placeholder="0.00"></div>
                <div class="field"><label>Stock</label><input type="number" id="prodStock" min="0" placeholder="Cantidad"></div>
                <div class="field checkbox-field">
                    <label><input type="checkbox" id="prodAvailable" checked> Disponible</label>
                </div>
                <div class="admin-actions">
                    <button class="btn-neon success" id="formSaveBtn" onclick="saveProduct()"><i class="fas fa-plus-circle"></i> Agregar</button>
                    <button class="btn-neon" id="formCancelBtn" onclick="cancelEdit()" style="display:none;"><i class="fas fa-times"></i> Cancelar</button>
                    <input type="hidden" id="editId" value="">
                    <input type="hidden" id="existingImage" value="">
                </div>
            </div>
            <!-- Lista admin -->
            <div class="admin-list">
                <h3 style="color:#88aacc; font-size:1rem; margin-bottom:15px;">Productos registrados</h3>
                <div id="adminProductList"></div>
            </div>
            <!-- Export/Import -->
            <div class="io-section">
                <div class="io-group">
                    <label>Exportar JSON</label>
                    <button class="btn-neon success" onclick="exportJSON()"><i class="fas fa-download"></i> Descargar</button>
                </div>
                <div class="io-group">
                    <label>Importar desde URL</label>
                    <input type="text" id="importUrl" placeholder="URL del JSON" value="https://raw.githubusercontent.com/costanorta-sys/neosolar/main/neosolar_catalog.json">
                    <button class="btn-neon admin" onclick="importFromURL()"><i class="fas fa-upload"></i> Cargar</button>
                </div>
                <div class="io-group">
                    <label>Forzar sincronización</label>
                    <button class="btn-neon" onclick="forceSync()"><i class="fas fa-redo"></i> Sincronizar ahora</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== LIGHTBOX ===== -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="close-lightbox" onclick="closeLightbox()">✕</button>
        <img id="lightboxImg" src="">
        <div class="lb-caption" id="lightboxCaption"></div>
    </div>

    <!-- ===== MODAL CARRITO ===== -->
    <div class="modal-overlay" id="cartModal">
        <div class="modal-box">
            <h3><i class="fas fa-shopping-cart" style="color:#39ff14;"></i> Añadir al carrito</h3>
            <div id="cartProductInfo" style="margin-bottom:12px; color:#a0b8d0;"></div>
            <div class="field">
                <label>Cantidad (máx. <span id="cartMaxStock">0</span>)</label>
                <input type="number" id="cartQty" value="1" min="1" step="1">
            </div>
            <div style="font-size:0.9rem; color:#88aacc; margin-top:4px;">
                Total: <span id="cartTotal" style="color:#39ff14; font-weight:700;">0.00 USD</span>
            </div>
            <div class="modal-actions">
                <button class="btn-neon" onclick="closeCartModal()"><i class="fas fa-times"></i> Cancelar</button>
                <button class="btn-neon success" onclick="confirmCart()"><i class="fab fa-whatsapp"></i> Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN PARA GITHUB PAGES (SIN PROXY)
        // ============================================================
        const JSON_URL = 'https://raw.githubusercontent.com/costanorta-sys/neosolar/main/neosolar_catalog.json';
        const STORAGE_KEY = 'neosolar_products';
        const CONFIG_KEY = 'neosolar_config';
        const CART_KEY = 'neosolar_cart';

        // ============================================================
        // ESTADO GLOBAL
        // ============================================================
        let productos = [];
        let categorias = [];
        let config = { whatsapp: "5358776771" };
        let cart = [];
        let categoriaActiva = 'all';
        let syncInProgress = false;
        let editingId = null;
        let cartProductId = null;
        let tempImageBase64 = '';

        // DOM refs
        const grid = document.getElementById('catalogGrid');
        const filter = document.getElementById('categoryFilter');
        const count = document.getElementById('productCount');
        const syncIndicator = document.getElementById('syncIndicator');
        const phoneInput = document.getElementById('phoneInput');
        const phoneStatus = document.getElementById('phoneStatus');

        // ============================================================
        // UTILIDADES
        // ============================================================
        function showToast(msg, isError = false) {
            document.querySelectorAll('.toast-msg').forEach(el => el.remove());
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            toast.style.background = isError ? '#c0392b' : '#1e2a3a';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function setSyncIndicator(status, msg) {
            syncIndicator.className = 'sync-indicator';
            if (status === 'loading') {
                syncIndicator.innerHTML = `<i class="fas fa-sync-alt spinning"></i> ${msg || 'Cargando...'}`;
            } else if (status === 'success') {
                syncIndicator.className = 'sync-indicator success';
                syncIndicator.innerHTML = `<i class="fas fa-check-circle"></i> ${msg || 'Sincronizado'}`;
            } else if (status === 'error') {
                syncIndicator.className = 'sync-indicator error';
                syncIndicator.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg || 'Error'}`;
            }
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ============================================================
        // PERSISTENCIA LOCAL
        // ============================================================
        function loadLocalData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { productos = JSON.parse(stored); } catch (e) { productos = []; }
            } else {
                productos = [];
            }

            const storedConfig = localStorage.getItem(CONFIG_KEY);
            if (storedConfig) {
                try { config = JSON.parse(storedConfig); } catch (e) {}
            } else {
                config = { whatsapp: "5358776771" };
                localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
            }

            const storedCart = localStorage.getItem(CART_KEY);
            if (storedCart) {
                try { cart = JSON.parse(storedCart); } catch (e) { cart = []; }
            } else {
                cart = [];
            }

            // Extraer categorías
            const cats = new Set();
            productos.forEach(p => { if (p.categoria) cats.add(p.categoria); });
            categorias = Array.from(cats);

            if (phoneInput) phoneInput.value = config.whatsapp || "5358776771";
            updatePhoneStatus();
        }

        function saveProductsLocal() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(productos));
        }

        function saveConfigLocal() {
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
        }

        function saveCartLocal() {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }

        // ============================================================
        // SINCRONIZACIÓN CON GITHUB (SIN PROXY, PARA GITHUB PAGES)
        // ============================================================
        async function syncFromGitHub(showFeedback = true) {
            if (syncInProgress) {
                showToast('Ya hay una sincronización en curso', false);
                return;
            }
            syncInProgress = true;
            setSyncIndicator('loading', 'Cargando...');
            if (document.getElementById('loadingSpinner')) {
                document.getElementById('loadingSpinner').style.display = 'flex';
            }

            let attempts = 0;
            const maxAttempts = 5; // Más intentos para archivos grandes
            let success = false;
            let lastError = null;

            while (attempts < maxAttempts && !success) {
                try {
                    attempts++;
                    console.log(`🌐 Intento ${attempts}/${maxAttempts} - ${JSON_URL}`);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 120000); // 2 minutos (archivo grande)

                    const response = await fetch(JSON_URL, {
                        signal: controller.signal,
                        cache: 'no-cache',
                        headers: { 
                            'Cache-Control': 'no-cache', 
                            'Pragma': 'no-cache', 
                            'Accept': 'application/json'
                        }
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    console.log('📦 Datos recibidos:', typeof data, Array.isArray(data) ? data.length + ' productos' : 'objeto');

                    // Detectar formato del JSON
                    let productosNuevos = [];
                    if (Array.isArray(data)) {
                        productosNuevos = data;
                    } else if (data.productos && Array.isArray(data.productos)) {
                        productosNuevos = data.productos;
                    } else {
                        throw new Error('Formato no reconocido: ni array ni objeto con "productos"');
                    }

                    if (productosNuevos.length === 0) {
                        throw new Error('El array de productos está vacío');
                    }

                    productos = productosNuevos;
                    saveProductsLocal();

                    // Actualizar categorías
                    const cats = new Set();
                    productos.forEach(p => { if (p.categoria) cats.add(p.categoria); });
                    categorias = Array.from(cats);

                    // Configuración adicional
                    if (data.config && data.config.whatsapp) {
                        config.whatsapp = data.config.whatsapp;
                        saveConfigLocal();
                        if (phoneInput) phoneInput.value = config.whatsapp;
                        updatePhoneStatus();
                    }

                    if (showFeedback) showToast(`✅ Sincronizado: ${productos.length} productos`);
                    setSyncIndicator('success', `${productos.length} productos`);
                    success = true;

                } catch (err) {
                    lastError = err;
                    console.error(`❌ Error en intento ${attempts}:`, err);
                    if (attempts < maxAttempts) {
                        const delay = 3000 * attempts;
                        showToast(`⏳ Reintentando (${attempts}/${maxAttempts})...`, false);
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }
            }

            if (!success) {
                if (showFeedback) showToast(`❌ Error: ${lastError ? lastError.message : 'Conexión fallida'}`, true);
                setSyncIndicator('error', 'Error');
                // Intentar usar datos locales existentes
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try { productos = JSON.parse(stored); } catch (e) { productos = []; }
                    const cats = new Set();
                    productos.forEach(p => { if (p.categoria) cats.add(p.categoria); });
                    categorias = Array.from(cats);
                    showToast('⚠️ Usando datos guardados localmente', false);
                }
            }

            syncInProgress = false;
            if (document.getElementById('loadingSpinner')) {
                document.getElementById('loadingSpinner').style.display = 'none';
            }

            // Renderizar siempre
            actualizarFiltros();
            renderProductos();
            renderAdminList();
        }

        // ============================================================
        // RENDERIZADO
        // ============================================================
        function actualizarFiltros() {
            const cats = new Set();
            productos.forEach(p => { if (p.categoria) cats.add(p.categoria); });
            categorias = Array.from(cats);
            let html = '<option value="all">Todas</option>';
            categorias.forEach(c => {
                html += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
            });
            filter.innerHTML = html;
            filter.value = categoriaActiva || 'all';
        }

        function applyFilter() {
            categoriaActiva = filter.value;
            renderProductos();
        }

        function renderProductos() {
            if (!grid) return;
            let filtrados = productos.filter(p => p.activo !== false);
            if (categoriaActiva !== 'all') {
                filtrados = filtrados.filter(p => p.categoria === categoriaActiva);
            }

            if (filtrados.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>No hay productos</h3>
                        <p>Presiona "Actualizar" para sincronizar.</p>
                    </div>
                `;
                count.textContent = '0 productos';
                return;
            }

            count.textContent = filtrados.length + ' productos';
            let html = '';
            filtrados.forEach(p => {
                const imgSrc = p.imagenBase64 || 'https://placehold.co/600x400?text=NEO+SOLAR';
                const stockText = (p.stock && p.stock > 0) ?
                    `<span class="badge"><i class="fas fa-check-circle" style="color:#39ff14;"></i> ${p.stock} uds.</span>` :
                    `<span class="badge agotado"><i class="fas fa-times-circle"></i> AGOTADO</span>`;
                const disabled = (p.stock && p.stock <= 0) ? 'disabled' : '';

                html += `
                    <div class="card">
                        <div class="card-img-wrapper" data-fullimg="${imgSrc}">
                            <img src="${imgSrc}" alt="${escapeHtml(p.nombre)}" loading="lazy" onerror="this.src='https://placehold.co/600x400?text=error'">
                        </div>
                        <div class="card-category">${p.categoria || 'Sin categoría'}</div>
                        <div class="card-title">${escapeHtml(p.nombre)}</div>
                        <div class="card-desc">${escapeHtml((p.descripcion || '').substring(0, 100))}</div>
                        <div class="card-price">$ ${p.precio ? p.precio.toFixed(2) : '0.00'}</div>
                        <div class="card-stock">${stockText}</div>
                        <div class="card-actions">
                            <button class="btn-neon" ${disabled} onclick="openCart('${p.id}')">
                                <i class="fas fa-cart-plus"></i> Añadir
                            </button>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;

            // Lightbox en imágenes
            document.querySelectorAll('.card-img-wrapper').forEach(el => {
                el.addEventListener('click', function() {
                    const full = this.getAttribute('data-fullimg');
                    if (full) {
                        document.getElementById('lightboxImg').src = full;
                        document.getElementById('lightbox').classList.add('open');
                    }
                });
            });
        }

        // ============================================================
        // ADMIN: CRUD
        // ============================================================
        function renderAdminList() {
            const container = document.getElementById('adminProductList');
            if (!container) return;
            if (!productos || productos.length === 0) {
                container.innerHTML = '<div class="text-muted" style="padding:20px;">No hay productos.</div>';
                return;
            }
            let html = '';
            productos.forEach(p => {
                const estado = p.activo !== false ? 'Activo' : 'Inactivo';
                const imgSrc = p.imagenBase64 || 'https://placehold.co/55x55';
                html += `
                    <div class="list-item">
                        <img class="thumb" src="${imgSrc}">
                        <div class="info">
                            <strong>${escapeHtml(p.nombre)}</strong>
                            <span class="small">${p.categoria || 'Sin cat.'}</span>
                            <span class="small">$ ${p.precio ? p.precio.toFixed(2) : '0.00'}</span>
                            <span class="small" style="color:${p.activo !== false ? '#39ff14' : '#ff3b5c'}">
                                ${p.activo !== false ? `Stock: ${p.stock || 0}` : 'INACTIVO'}
                            </span>
                        </div>
                        <div class="actions">
                            <button class="btn-neon" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-neon danger" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                            <button class="btn-neon ${p.activo !== false ? 'danger' : 'success'}" onclick="toggleStatus('${p.id}')">
                                ${p.activo !== false ? 'Desactivar' : 'Activar'}
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function toggleStatus(id) {
            const p = productos.find(prod => prod.id == id);
            if (p) {
                p.activo = !(p.activo !== false);
                saveProductsLocal();
                renderAdminList();
                renderProductos();
                showToast(`Producto ${p.activo !== false ? 'activado' : 'desactivado'}`);
            }
        }

        function editProduct(id) {
            const p = productos.find(prod => prod.id == id);
            if (!p) return;
            editingId = p.id;
            document.getElementById('editId').value = p.id;
            document.getElementById('prodName').value = p.nombre || '';
            document.getElementById('prodCategory').value = p.categoria || '';
            document.getElementById('prodDesc').value = p.descripcion || '';
            document.getElementById('prodPrice').value = p.precio || '';
            document.getElementById('prodStock').value = p.stock || 0;
            document.getElementById('prodAvailable').checked = p.activo !== false;
            if (p.imagenBase64) {
                document.getElementById('prodImagePreview').src = p.imagenBase64;
                document.getElementById('prodImagePreview').style.display = 'block';
                document.getElementById('existingImage').value = p.imagenBase64;
            } else {
                document.getElementById('prodImagePreview').style.display = 'none';
                document.getElementById('existingImage').value = '';
            }
            tempImageBase64 = '';
            document.getElementById('prodImageFile').value = '';
            document.getElementById('formSaveBtn').innerHTML = '<i class="fas fa-save"></i> Actualizar';
            document.getElementById('formCancelBtn').style.display = 'inline-flex';
            document.getElementById('productForm').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('editId').value = '';
            document.getElementById('formSaveBtn').innerHTML = '<i class="fas fa-plus-circle"></i> Agregar';
            document.getElementById('formCancelBtn').style.display = 'none';
            document.getElementById('prodName').value = '';
            document.getElementById('prodCategory').value = '';
            document.getElementById('prodDesc').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodStock').value = '';
            document.getElementById('prodAvailable').checked = true;
            document.getElementById('prodImageFile').value = '';
            document.getElementById('prodImagePreview').style.display = 'none';
            document.getElementById('existingImage').value = '';
            tempImageBase64 = '';
        }

        function saveProduct() {
            const name = document.getElementById('prodName').value.trim();
            const category = document.getElementById('prodCategory').value.trim();
            const desc = document.getElementById('prodDesc').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value);
            const stock = parseInt(document.getElementById('prodStock').value) || 0;
            const available = document.getElementById('prodAvailable').checked;
            const editIdVal = document.getElementById('editId').value;

            if (!name || isNaN(price) || price < 0) {
                showToast('Completa nombre y precio válido', true);
                return;
            }

            let image = document.getElementById('existingImage').value || '';
            if (tempImageBase64) image = tempImageBase64;

            const file = document.getElementById('prodImageFile').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    image = e.target.result;
                    saveProductData(name, category, desc, price, stock, available, image, editIdVal);
                };
                reader.readAsDataURL(file);
                return;
            }

            saveProductData(name, category, desc, price, stock, available, image, editIdVal);
        }

        function saveProductData(name, category, desc, price, stock, available, image, editIdVal) {
            if (editIdVal) {
                const idx = productos.findIndex(p => p.id == editIdVal);
                if (idx !== -1) {
                    productos[idx] = {
                        ...productos[idx],
                        nombre: name,
                        categoria: category,
                        descripcion: desc,
                        precio: price,
                        stock: stock,
                        activo: available,
                        imagenBase64: image || productos[idx].imagenBase64
                    };
                }
                showToast('Producto actualizado');
            } else {
                const newProduct = {
                    id: Date.now(),
                    nombre: name,
                    categoria: category,
                    descripcion: desc,
                    precio: price,
                    stock: stock,
                    activo: available,
                    imagenBase64: image || ''
                };
                productos.push(newProduct);
                showToast('Producto agregado');
            }

            saveProductsLocal();
            cancelEdit();
            actualizarFiltros();
            renderProductos();
            renderAdminList();
        }

        function deleteProduct(id) {
            if (!confirm('¿Eliminar permanentemente?')) return;
            productos = productos.filter(p => p.id != id);
            saveProductsLocal();
            renderAdminList();
            renderProductos();
            actualizarFiltros();
            showToast('Producto eliminado');
        }

        // ============================================================
        // TELÉFONO
        // ============================================================
        function savePhoneNumber() {
            const val = phoneInput.value.trim();
            if (val) {
                config.whatsapp = val;
                saveConfigLocal();
                updatePhoneStatus();
                showToast('Número guardado');
            } else {
                showToast('Ingresa un número válido', true);
            }
        }

        function updatePhoneStatus() {
            const num = config.whatsapp || 'No configurado';
            phoneStatus.innerHTML = `<i class="fas fa-check-circle"></i> Configurado: +${num}`;
            phoneStatus.style.color = '#39ff14';
        }

        function getWhatsAppNumber() {
            return config.whatsapp || "5358776771";
        }

        // ============================================================
        // CARRITO
        // ============================================================
        function openCart(productId) {
            const p = productos.find(prod => prod.id == productId);
            if (!p) return;
            if (p.activo === false || p.stock <= 0) {
                showToast('Producto no disponible', true);
                return;
            }
            cartProductId = p.id;
            document.getElementById('cartProductInfo').innerHTML =
                `<strong>${escapeHtml(p.nombre)}</strong> · $ ${p.precio ? p.precio.toFixed(2) : '0.00'}/ud.`;
            document.getElementById('cartMaxStock').textContent = p.stock || 0;
            document.getElementById('cartQty').value = 1;
            document.getElementById('cartQty').max = p.stock || 1;
            updateCartTotal();
            document.getElementById('cartModal').classList.add('open');
        }

        function closeCartModal() {
            document.getElementById('cartModal').classList.remove('open');
        }

        function updateCartTotal() {
            const p = productos.find(prod => prod.id == cartProductId);
            if (!p) return;
            const qty = parseInt(document.getElementById('cartQty').value) || 1;
            const total = (p.precio || 0) * qty;
            document.getElementById('cartTotal').textContent = total.toFixed(2) + ' USD';
        }

        document.getElementById('cartQty').addEventListener('input', updateCartTotal);

        function confirmCart() {
            const phone = getWhatsAppNumber();
            if (!phone) {
                showToast('Configura tu número de WhatsApp', true);
                return;
            }
            const p = productos.find(prod => prod.id == cartProductId);
            if (!p) return;
            const qty = parseInt(document.getElementById('cartQty').value) || 1;
            if (qty < 1) {
                showToast('Cantidad mínima 1', true);
                return;
            }
            if (qty > (p.stock || 0)) {
                showToast(`Stock insuficiente. Disponible: ${p.stock}`, true);
                return;
            }
            const total = (p.precio || 0) * qty;
            const mensaje =
                `Hola, me gustaría realizar el siguiente pedido:\n` +
                `- Producto: ${p.nombre}\n` +
                `- Cantidad: ${qty}\n` +
                `- Precio unitario: $ ${p.precio ? p.precio.toFixed(2) : '0.00'}\n` +
                `- Total: $ ${total.toFixed(2)}\n\n` +
                `Gracias.`;
            const url = `https://wa.me/${phone}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
            closeCartModal();
            showToast('Pedido enviado por WhatsApp');
        }

        // ============================================================
        // EXPORTAR / IMPORTAR
        // ============================================================
        function exportJSON() {
            const data = { productos, config, categorias, version: "1.0", lastExport: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'neosolar_catalog.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('JSON exportado');
        }

        async function importFromURL() {
            const url = document.getElementById('importUrl').value.trim();
            if (!url) { showToast('Ingresa una URL', true); return; }
            if (!confirm('Reemplazará todos los productos. ¿Continuar?')) return;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                let productosNuevos = [];
                if (Array.isArray(data)) productosNuevos = data;
                else if (data.productos && Array.isArray(data.productos)) productosNuevos = data.productos;
                else throw new Error('Formato no válido');
                productos = productosNuevos;
                saveProductsLocal();
                actualizarFiltros();
                renderProductos();
                renderAdminList();
                showToast(`Importado: ${productos.length} productos`);
            } catch (err) {
                showToast(`Error: ${err.message}`, true);
            }
        }

        // ============================================================
        // FORZAR SINCRONIZACIÓN
        // ============================================================
        async function forceSync() {
            await syncFromGitHub(true);
        }

        // ============================================================
        // LIGHTBOX
        // ============================================================
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
                closeCartModal();
            }
        });

        // ============================================================
        // VISTAS
        // ============================================================
        function switchView(view) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            if (view === 'catalog') {
                document.getElementById('catalogView').classList.add('active');
                history.pushState(null, '', '#/');
            } else if (view === 'admin') {
                document.getElementById('adminView').classList.add('active');
                renderAdminList();
                history.pushState(null, '', '#/admin');
            }
        }

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            if (hash === '#/admin') switchView('admin');
            else switchView('catalog');
        });

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        async function init() {
            // Cargar datos locales primero
            loadLocalData();

            // Configurar campo de importación
            document.getElementById('importUrl').value = JSON_URL;

            // Renderizar con datos locales (si existen)
            actualizarFiltros();
            renderProductos();
            renderAdminList();

            // Luego sincronizar desde GitHub
            await syncFromGitHub(true);

            // Manejar hash
            const hash = window.location.hash;
            if (hash === '#/admin') switchView('admin');
            else switchView('catalog');

            // Evento para previsualizar imagen
            document.getElementById('prodImageFile').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) {
                    tempImageBase64 = '';
                    document.getElementById('prodImagePreview').style.display = 'none';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    tempImageBase64 = ev.target.result;
                    document.getElementById('prodImagePreview').src = tempImageBase64;
                    document.getElementById('prodImagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            });

            console.log('✅ NEO·SOLAR iniciado para GitHub Pages');
            console.log('📦 Productos:', productos.length);
            console.log('📱 WhatsApp:', getWhatsAppNumber());
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
